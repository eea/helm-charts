{{- if .Values.ingress.ratelimitting.egmsapi.enabled -}}

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clms-egms-oauth
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: clms-frontend
  annotations:
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if .Values.ingress.serverSnippet }}
    nginx.ingress.kubernetes.io/server-snippet: |
      {{- .Values.ingress.serverSnippet | nindent 6 }}
  {{- end }}
  {{- range $key, $value := .Values.ingress.ratelimitting.egmsapi.configuration }}
    {{- if ($value) }}
    nginx.ingress.kubernetes.io/{{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}


spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.volto.hostname }}
    http:
      paths:
      - path: {{ .Values.ingress.ratelimitting.egmsapi.path }}
        pathType: ImplementationSpecific
        backend:
          service:
            {{- if and .Values.traefik .Values.traefik.enabled }}
            name: {{ .Values.traefik.serviceName }}
            port:
              number: 80
            {{- else if and .Values.apache .Values.apache.enabled }}
            name: {{ .Values.apache.serviceName }}
            port:
              number: 80
            {{- else }}
            name: {{ .Values.varnish.serviceName }}
            port:
              number: {{ .Values.varnish.port }}
            {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
  - hosts:
    - {{ .Values.volto.hostname }}
    {{- if .Values.ingress.certificate }}
    secretName: {{ .Values.ingress.certificate }}
    {{- end  }}
  {{- end  }}

{{- end }}  
