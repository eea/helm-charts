# Default values for rn-clamav.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
enabled: true

replicaCount: 1

image:
  repository: clamav/clamav
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

timezone: Europe/Copenhagen

# clamd.conf scan limits (bytes). Rendered into the ConfigMap.
maxFileSize: "2147483648"
maxScanSize: "2147483648"
streamMaxLength: "2147483648"

# Extra clamd.conf directives appended verbatim to the ConfigMap.
extraClamdConf: ""

# Wait up to 3 minutes for freshclam to populate the signature DB before
# clamd starts accepting connections. Override via env if needed.
clamdStartupTimeout: "180"

storage: 3Gi
storageName: clamav-data

# Network Policy configuration
networkPolicy:
  # -- Enable network policy
  enabled: true
  # CIDR allowed for ingress on the clamd port. Must cover the cluster's
  # node IPs so kubelet probes (TCP startup/liveness/readiness) reach the pod.
  nodeCidr: 10.0.0.0/8
  spec: {}

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  # The upstream clamav/clamav image runs as the `clamav` user (uid/gid 100).
  # fsGroup ensures the persistent signature DB volume is writable.
  fsGroup: 100

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3310

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# clamd only starts listening once freshclam has loaded the signature DB.
# On a fresh PVC that download can take several minutes, so a generous
# startupProbe gates the readiness/liveness checks.
startupProbe:
  tcpSocket:
    port: 3310
  periodSeconds: 10
  failureThreshold: 180  # 30 minutes
readinessProbe:
  tcpSocket:
    port: 3310
  periodSeconds: 10
livenessProbe:
  tcpSocket:
    port: 3310
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 minutes to ensure we need to scale down
      policies:
      - type: Percent
        value: 100    # Allow scaling down all unnecessary pods
        periodSeconds: 300  # But only every 5 minutes
    scaleUp:
      stabilizationWindowSeconds: 0    # React quickly to scale up needs
      policies:
      - type: Percent
        value: 100    # Allow doubling the pods
        periodSeconds: 60   # Every minute

nodeSelector: {}

tolerations: []

affinity: {}
