apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appl.fullname" . }}
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    app.kubernetes.io/component: esapp
spec:
  replicas: {{ .Values.esapp.replicaCount }}
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: esapp
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: esapp
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      initContainers:
      - name: esbootstrap-data-config
        image: eeacms/esbootstrap-configs:v3.0.121 
        imagePullPolicy: {{ .Values.esbootstrap.image.pullPolicy }}
        env:
        - name: github_repo
          value: "{{ .Values.esbootstrap.env.github_repo }}"
        - name: DEV_ENV
          value: "{{ .Values.esbootstrap.env.DEV_ENV }}"
        - name: TZ
          value: "{{ .Values.timezone }}"
        volumeMounts:
        - name: esbootstrapdataconfig
          mountPath: /code/config
        resources:
          limits:
            memory: 64Mi
          requests:
            memory: 64Mi
      containers:
      - name: esapp
        securityContext:
          runAsUser: 0
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.esapp.image.pullPolicy }}
        {{- if .Values.ide.enabled }}
        args:
          - >
            /node_modules/.bin/nodemon -L --watch
            /code/config/CO2_vans/settings.json --watch /code/app.js
            /code/app.js runserver
        command:
          - /bin/sh
          - '-c'
        {{- end }}
        env:
        {{- range $key, $value := .Values.esapp.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        - name: "VERSION_INFO"
          value: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        - name: TZ
          value: "{{ .Values.timezone }}"
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        resources:
          {{- toYaml .Values.esapp.resources | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.esapp.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.esapp.livenessProbe | nindent 10 }}
        startupProbe:
          {{- toYaml .Values.esapp.startupProbe | nindent 10 }}
        volumeMounts:
        - name: esbootstrapdataconfig
          mountPath: /code/config
      volumes:
      - name: esbootstrapdataconfig
      {{- if .Values.storage.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "appl.fullname" . }}-config
      {{- else }}
        emptyDir: {}
      {{- end }}
