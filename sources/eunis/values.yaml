# Default values for eunis.

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 8
  targetCPUUtilizationPercentage: 50
  # targetMemoryUtilizationPercentage: 80

replicaCount: 1

image:
  repository: tomcat
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "8.5.46-jdk8-openjdk"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

timezone: Europe/Copenhagen

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}

service:
  type: ClusterIP
  port: 8080

healthchecks:
  startup:
    enabled: true
    probe:
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 6
      httpGet:
        path: /systemcheck.jsp
        port: tomcat

  readiness:
    enabled: true
    probe:
      periodSeconds: 10
      timeoutSeconds: 1
      httpGet:
        path: /systemcheck.jsp
        port: tomcat

  liveness:
    enabled: true
    probe:
      periodSeconds: 20
      timeoutSeconds: 2
      httpGet:
        path: /systemcheck.jsp
        port: tomcat

#Unused
ldap:
  url: ldaps://ldap.eea.europa.eu:636/
  principal: REPLACEME
  password: REPLACEME

ingress:
  enabled: false
  className: ""
  annotations: {}
    #nginx.ingress.kubernetes.io/affinity: cookie
    #nginx.ingress.kubernetes.io/affinity-mode: persistent
    #nginx.ingress.kubernetes.io/session-cookie-name: backend
  hosts:
    - host: eunis.eea.europa.eu
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - eunis.eea.europa.eu

apache:
  enabled: false
  image:
    repository: eeacms/apache
    tag: "2.4-3.4"
  serviceType: ClusterIP
  modules: "headers_module proxy_module proxy_http_module rewrite_module"
  redirectConfig: |-
    RewriteRule ^/species/([0-9]+)$ https://biodiversity.europa.eu/species/$1 [R=301,L,NE]
  extraConfig: ""
  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 512Mi
  livenessProbe:
    tcpSocket:
      port: http
    periodSeconds: 10
    timeoutSeconds: 10
    initialDelaySeconds: 30
    failureThreshold: 5
    successThreshold: 1
  startupProbe:
    tcpSocket:
      port: http
    periodSeconds: 5
    timeoutSeconds: 10
    initialDelaySeconds: 10
    failureThreshold: 12
    successThreshold: 1
  nodeSelector: {}
  tolerations: []
  affinity: {}

resources:
  requests:
    memory: 256Mi
#   cpu: 100m
  limits:
    memory: 1Gi
#   cpu: 100m

nodeSelector: {}

tolerations: []

affinity: {}

mariadb:
  securityContext: {}
  resources:
    requests:
      memory: 1Gi
  #   cpu: 100m
    limits:
      memory: 1Gi
  #   cpu: 100m
  database: eunis
  username: eunisuser
  password: REPLACEME
  rootpw: REPLACEME
  args:
  - mariadbd
  - --max_allowed_packet=128M
  - --character_set_server=utf8
  - --binlog_cache_size=32M
  - --max_heap_table_size=64M
  - --performance_schema=OFF
  - --tmp_table_size=64M
  - --query_cache_limit=32M
  - --query_cache_size=64M
  - --innodb_file_per_table=ON
  - --innodb_buffer_pool_instances=2
  - --innodb_buffer_pool_size=2G
  - --innodb_data_file_path=ibdata1:10M:autoextend
  - --innodb_log_buffer_size=8M
  - --innodb_log_file_size=48M
  - --innodb_log_files_in_group=3
  - --innodb_max_dirty_pages_pct=90
  storage: 10Gi
  storageClassName: ""

buildsw:
  enabled: false
  resources:
    requests:
      memory: 64Mi
    limits:
      memory: 128Mi
  securityContext: {}
