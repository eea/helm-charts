{{- if eq (include "appl.apacheEnabled" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appl.fullname" . }}-apache
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: apache
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      component: apache
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        component: apache
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      containers:
      - name: apache
        image: "{{ .Values.apache.image.repository }}:{{ .Values.apache.image.tag }}"
        env:
        - name: TZ
          value: "{{ .Values.timezone }}"
        - name: APACHE_MODULES
          value: "{{ .Values.apache.modules }}"
        - name: APACHE_CONFIG
          valueFrom:
            configMapKeyRef:
              name: {{ include "appl.fullname" . }}-apache-config
              key: vh-my-app.conf
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        {{- if .Values.apache.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.apache.livenessProbe | nindent 10 }}
        {{- end }}
        {{- if .Values.apache.startupProbe }}
        startupProbe:
          {{- toYaml .Values.apache.startupProbe | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.apache.resources | nindent 10 }}
      {{- with .Values.apache.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apache.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apache.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Always
{{- end }}
