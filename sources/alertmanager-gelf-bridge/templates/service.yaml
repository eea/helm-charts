apiVersion: v1
kind: Service
metadata:
  name: {{ include "alertmanager-gelf-bridge.fullname" . }}
  labels:
    {{- include "alertmanager-gelf-bridge.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "alertmanager-gelf-bridge.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
