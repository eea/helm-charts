# Cluster name attached to every GELF message.
# Example: "01test"
clusterName: ""

# Full Graylog GELF HTTP input URL.
# Example: "http://graylog.example:12202/gelf"
graylogUrl: ""

replicaCount: 1

image:
  repository: python
  tag: "3.12-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

podAnnotations: {}
podLabels: {}

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

# AlertmanagerConfig is disabled by default.
# Recommended production pattern:
#   - install the bridge app with alertmanagerConfig.enabled=false
#   - manage Alertmanager routing separately if you already have existing routes
#
# Important: prometheus-operator may inject namespace matchers and route continuation
# when merging multiple AlertmanagerConfig resources. This can create duplicate
# notifications if multiple top-level routes match the same alert.
alertmanagerConfig:
  enabled: false

  # Kubernetes object name for the optional AlertmanagerConfig.
  name: graylog-gelf-http-config

  # Empty means use the Helm release namespace.
  namespace: ""

  # Alertmanager receiver name referenced by spec.route.receiver.
  receiverName: graylog-gelf-http-receiver

  sendResolved: true

  groupBy:
    - alertname
    - namespace
    - severity
  groupWait: 30s
  groupInterval: 5m
  repeatInterval: 4h

  # Optional route matchers. Leave empty to let this route match all alerts
  # allowed by prometheus-operator's AlertmanagerConfig matcher strategy.
  # Examples:
  # matchers:
  #   - name: severity
  #     matchType: =~
  #     value: warning|critical
  #   - name: alertname
  #     matchType: !=
  #     value: Watchdog
  matchers: []

  # Optional route continuation.
  # Set to true only if you intentionally want Alertmanager to continue evaluating
  # later sibling routes after this one matches.
  # Leave null to omit the field from the AlertmanagerConfig.
  continue: null
