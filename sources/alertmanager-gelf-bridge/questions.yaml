questions:
  - variable: clusterName
    label: Cluster name
    description: Name attached to Alertmanager messages sent to Graylog, for example 01prod or 01test.
    type: string
    required: true
    group: "Graylog settings"

  - variable: graylogUrl
    label: Graylog GELF HTTP URL
    description: Full Graylog GELF HTTP endpoint, for example http://graylog.example:12202/gelf.
    type: string
    required: true
    group: "Graylog settings"

  - variable: replicaCount
    label: Replica count
    description: Keep this at 1 unless the bridge is made stateful-safe.
    type: int
    default: 1
    required: true
    group: "Deployment settings"

  - variable: image.repository
    label: Image repository
    type: string
    default: python
    required: true
    group: "Container image"

  - variable: image.tag
    label: Image tag
    type: string
    default: "3.12-alpine"
    required: true
    group: "Container image"

  - variable: image.pullPolicy
    label: Image pull policy
    type: enum
    default: IfNotPresent
    required: true
    options:
      - Always
      - IfNotPresent
      - Never
    group: "Container image"

  - variable: alertmanagerConfig.enabled
    label: Create AlertmanagerConfig
    description: Optional. Enable this to create the AlertmanagerConfig receiver and route with this chart.
    type: boolean
    default: false
    required: true
    group: "Alertmanager routing"


  - variable: alertmanagerConfig.name
    label: AlertmanagerConfig name
    description: Name of the AlertmanagerConfig resource to create.
    type: string
    default: graylog-gelf-http
    required: true
    group: "Alertmanager routing"
    show_if: "alertmanagerConfig.enabled=true"

  - variable: alertmanagerConfig.receiverName
    label: Alertmanager receiver name
    description: Receiver name referenced by the AlertmanagerConfig route.
    type: string
    default: graylog-gelf-http
    required: true
    group: "Alertmanager routing"
    show_if: "alertmanagerConfig.enabled=true"

  - variable: alertmanagerConfig.sendResolved
    label: Send resolved alerts
    description: Send resolved notifications to the bridge.
    type: boolean
    default: true
    required: true
    group: "Alertmanager routing"
    show_if: "alertmanagerConfig.enabled=true"
