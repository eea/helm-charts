{{- if gt (int .Values.api.replicaCount) 0 }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "onyx.fullname" . }}-api-server
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
    {{- with .Values.api.deploymentLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "onyx.selectorLabels" . | nindent 6 }}
      {{- if .Values.api.deploymentLabels }}
      {{- toYaml .Values.api.deploymentLabels | nindent 6 }}
      {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- $pgIntoChecksum := include "onyx.pgInto.checksumAnnotation" . }}
        {{- if $pgIntoChecksum }}
        {{- $pgIntoChecksum | nindent 8 }}
        {{- end }}
      {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "onyx.labels" . | nindent 8 }}
        {{- with .Values.api.deploymentLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "onyx.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $backendRepo := .Values.global.image.repository }}
      {{- if and .Values.api.image .Values.api.image.repository }}
        {{- $backendRepo = .Values.api.image.repository }}
      {{- end }}
      {{- $backendTag := default .Values.global.image.tags.backend (printf "backend-%s" (default .Chart.AppVersion .Values.global.version)) }}
      {{- if and .Values.api.image .Values.api.image.tag }}
        {{- $backendTag = .Values.api.image.tag }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-server
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          image: "{{ $backendRepo }}:{{ $backendTag }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          command:
            - "/bin/sh"
            - "-c"
            - |
              {{- if .Values.api.runUpdateCaCertificates }}
              update-ca-certificates &&
              {{- end }}
              alembic upgrade head &&
              echo "Starting Onyx Api Server" &&
              uvicorn onyx.main:app --host {{ .Values.global.host }} --port {{ .Values.api.containerPorts.server }}
          ports:
            - name: api-server-port
              containerPort: {{ .Values.api.containerPorts.server }}
              protocol: TCP
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- with .Values.api.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Values.config.envConfigMapName }}
          env:
            {{- include "onyx.envSecrets" . | nindent 12}}
          {{- if .Values.hfCache.enabled }}
          volumeMounts:
            - name: hf-cache
              mountPath: {{ .Values.hfCache.mountPath }}
            {{- with .Values.api.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else }}
          {{- $apiVolumeMounts := include "onyx.renderVolumeMounts" (dict "ctx" . "volumeMounts" .Values.api.volumeMounts) }}
          {{- if $apiVolumeMounts }}
          {{- $apiVolumeMounts | nindent 10 }}
          {{- end }}
          {{- end }}
      {{- if .Values.hfCache.enabled }}
      volumes:
        - name: hf-cache
          emptyDir: {}
        {{- with .Values.api.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- else }}
      {{- $apiVolumes := include "onyx.renderVolumes" (dict "ctx" . "volumes" .Values.api.volumes) }}
      {{- if $apiVolumes }}
      {{- $apiVolumes | nindent 6 }}
      {{- end }}
      {{- end }}
{{- end }}
