{{- if .Values.minio.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "appl.fullname" . }}-minio
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  {{- with .Values.minio.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.minio.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.minio.ingress.tls }}
  tls:
    {{- range .Values.minio.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.minio.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ default "/" .path }}
            pathType: {{ default "Prefix" .pathType }}
            backend:
              service:
                # you said it's this exact service
                name: llm-toolkit-minio
                port:
                  number: 9000
    {{- end }}
{{- end }}