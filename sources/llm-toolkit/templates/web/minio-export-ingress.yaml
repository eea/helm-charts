{{- if and .Values.minio.deploy .Values.minio.ingress.enabled -}}
{{- $className := .Values.minio.ingress.className | default .Values.langfuse.ingress.className -}}
{{- $annotations := .Values.minio.ingress.annotations | default .Values.langfuse.ingress.annotations -}}
{{- $tls := .Values.minio.ingress.tls | default .Values.langfuse.ingress.tls -}}
{{- $hosts := .Values.minio.ingress.hosts -}}
{{- if not $hosts -}}
  {{- if and .Values.langfuse.ingress.hosts (gt (len .Values.langfuse.ingress.hosts) 0) -}}
    {{- $hosts = list (dict "host" ((index .Values.langfuse.ingress.hosts 0).host)) -}}
  {{- end -}}
{{- end -}}
{{- if not $hosts -}}
  {{- fail "minio.ingress.enabled=true requires minio.ingress.hosts or langfuse.ingress.hosts" -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "appl.fullname" . }}-minio-export
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if $tls }}
  tls:
    {{- range $tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ default "/langfuse/exports/" .path }}
            pathType: {{ default "ImplementationSpecific" .pathType }}
            backend:
              service:
                name: {{ include "appl.fullname" $ }}-minio
                port:
                  number: 9000
    {{- end }}
{{- end }}
