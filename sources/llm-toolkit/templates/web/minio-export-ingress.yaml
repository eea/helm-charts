{{- $langfuseHosts := .Values.langfuse.ingress.hosts -}}
{{- $hasLangfuseHost := and $langfuseHosts (gt (len $langfuseHosts) 0) -}}
{{- if and .Values.minio.deploy .Values.langfuse.ingress.enabled $hasLangfuseHost -}}
{{- $className := .Values.langfuse.ingress.className -}}
{{- $annotations := .Values.langfuse.ingress.annotations -}}
{{- $tls := .Values.langfuse.ingress.tls -}}
{{- $host := (index $langfuseHosts 0).host -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "appl.fullname" . }}-minio-export
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if $tls }}
  tls:
    {{- range $tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /langfuse/exports/
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "appl.fullname" $ }}-minio
                port:
                  number: 9000
{{- end }}
