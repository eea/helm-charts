image:
  repository: eeacms/fise-backend
  pullPolicy: Always
  tag: ''

imagePullSecrets: []

nameOverride: ''
fullnameOverride: ''

serviceAccount:
  annotations: {}
  create: false
  name: ''

timezone: Europe/Copenhagen

links:
  createDatabaseService: true
  createMemcachedService: true
  database: postgres-postgres.database
  memcached: postgres-memcached.database

ingress:
  annotations:
    cert-manager.io/cluster-issuer: 01dev-eea-letsencrypt
  certificate: demo-forest.01dev.eea.europa.eu-tls
  tls: true

plone:
  annotations: {}
  autoscaling:
    enabled: false
    maxReplicas: 6
    minReplicas: 1
    targetMemoryUtilizationPercentage: 60
  site: fise
  googleUrl: google85dc6cec8f1329e5.html
  database:
    POSTGRES_DB: database
    POSTGRES_USER: databaseuser
    POSTGRES_PASSWORD: databasepassword
  environment:
    CORS_ALLOW_ORIGIN: http://localhost:3000
    DEFAULT_ORGANISATIONS: ''
    DEFAULT_PUBLISHER: EEA
    DYNAMIC_BANNER_ENABLED: 'No'
    GRAYLOG: logcentral.eea.europa.eu:12201
    SENTRY_DSN: ''
    SENTRY_ENVIRONMENT: 01dev
    STATIC_BANNER_ENABLED: 'Yes'
    PLONE_REGISTRY_YAML_CONTENT: ""
    RAZZLE_PROXY_ES_DSN_globalsearch: ""
  hostname: demo-forest.01dev.eea.europa.eu
  livenessProbe:
    failureThreshold: 6
    httpGet:
      path: /ok
      port: http
    initialDelaySeconds: 30
    periodSeconds: 20
    successThreshold: 1
    timeoutSeconds: 10
  readinessProbe:
    failureThreshold: 4
    httpGet:
      path: /ok
      port: http
    initialDelaySeconds: 60
    periodSeconds: 15
    successThreshold: 2
    timeoutSeconds: 10
  replicaCount: 1
  resources:
    limits:
      memory: 4Gi
    requests:
      memory: 4Gi
  serviceType: ClusterIP
  startupProbe:
    failureThreshold: 12
    httpGet:
      path: /ok
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 10

varnish:
  serviceType: ClusterIP
  serviceName: backend-varnish
  backend: backend-plone
  port: 8080
  resources:
    limits:
      memory: 5Gi
    requests:
      memory: 3Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  environment:
    AUTOKILL_CRON: ''
    VARNISH_BERESP_GRACE: 120s
    VARNISH_BERESP_KEEP: 120s
    VARNISH_BERESP_TTL: 60s
    VARNISH_DNS_TTL: 20s
    VARNISH_GZIP_ENABLED: 'true'
    VARNISH_GZIP_JSON_ENABLED: 'true'
    VARNISH_SIZE: 2G
  livenessProbe:
    httpGet:
      path: /ok
      port: http
    periodSeconds: 10
    timeoutSeconds: 10
    initialDelaySeconds: 30
    failureThreshold: 5
    successThreshold: 1
  startupProbe:
    httpGet:
      path: /ok
      port: http
    periodSeconds: 5
    timeoutSeconds: 10
    initialDelaySeconds: 10
    failureThreshold: 12
    successThreshold: 1

debug:
  serviceType: NodePort
  enabled: true
  resources:
    limits:
      memory: 4Gi
    requests:
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  environment: {}

entrasync:
  enabled: false
  schedule: "0 0 * * *"
  keepSuccessfulPods: 3
  keepFailedPods: 5
  resources:
    limits:
      memory: 2Gi
    requests:
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}

zodbpack:
  enabled: false
  schedule: "0 3 * * 0"
  keepSuccessfulPods: 3
  keepFailedPods: 5
  resources:
    limits:
      memory: 2Gi
    requests:
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}

postfix:
  dryrun: true
  fullnameOverride: ''
  mailtrap:
    httpenabled: false
    ingress:
      annotations:
        cert-manager.io/cluster-issuer: 01dev-eea-letsencrypt
      certificate: mailtrap.01dev.eea.europa.eu-tls
      enabled: false
      hostname: mailtrap.01dev.eea.europa.eu
    serviceType: NodePort
  mtpPass: ''
  mtpPort: ''
  mtpRelay: ''
  mtpUser: ''
  serverName: plone.eea.europa.eu
  serviceName: postfix
