{{- if .Values.ingress.enabled }}
{{- $host := .Values.plone.hostname }}
{{- $rules := list
  (dict "name" "metadata" "path" "/metadata" "target" "/en/metadata")
  (dict "name" "observatory" "path" "/observatory" "target" "/en/observatory")
  (dict "name" "mission" "path" "/mission" "target" "/en/mission")
  (dict "name" "eu-adaptation-policy" "path" "/eu-adaptation-policy" "target" "/en/eu-adaptation-policy")
}}
{{- range $rule := $rules }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cca-redirect-{{ $rule.name }}
  labels:
    {{- include "appl.labels" $ | nindent 4 }}
    component: cca-redirect
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: https://{{ $host }}{{ $rule.target }}$is_args$args
spec:
  ingressClassName: nginx
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: {{ $rule.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.varnish.serviceName }}
                port:
                  number: {{ $.Values.varnish.port }}
  {{- if $.Values.ingress.tls }}
  tls:
    - hosts:
        - {{ $host }}
      {{- if $.Values.ingress.certificate }}
      secretName: {{ $.Values.ingress.certificate }}
      {{- end }}
  {{- end }}
---
{{- end }}
{{- end }}
