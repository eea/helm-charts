{{- if .Values.memcached.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.memcached.serviceName }}
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: memcached
spec:
  ports:
    - name: memcache
      port: 11211
      targetPort: memcache
  selector:
    {{- include "appl.selectorLabels" . | nindent 4 }}
    component: memcached
{{- end }}
