{{- if .Values.ploneTranslate.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plone-translate
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: plone-translate
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      component: plone-translate
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        component: plone-translate
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      containers:
        - name: plone-translate
          image: "{{ .Values.ploneTranslate.image.repository }}:{{ .Values.ploneTranslate.image.tag }}"
          imagePullPolicy: {{ .Values.ploneTranslate.image.pullPolicy }}
          env:
{{ include "cca-backend.backendEnv" (dict "root" . "component" .Values.ploneTranslate) | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          {{- if .Values.ploneTranslate.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.ploneTranslate.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.ploneTranslate.startupProbe }}
          startupProbe:
            {{- toYaml .Values.ploneTranslate.startupProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.ploneTranslate.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.ploneTranslate.readinessProbe | nindent 12 }}
          {{- end }}
          {{- $mounts := include "cca-backend.sharedVolumeMounts" . | trim }}
          {{- if $mounts }}
          volumeMounts:
{{ $mounts | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.ploneTranslate.resources | nindent 12 }}
      {{- $volumes := include "cca-backend.sharedVolumes" . | trim }}
      {{- if $volumes }}
      volumes:
{{ $volumes | nindent 8 }}
      {{- end }}
      {{- with .Values.ploneTranslate.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ploneTranslate.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ploneTranslate.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
