{{- if .Values.rsync.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsync
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: rsync
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      component: rsync
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        component: rsync
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      containers:
        - name: rsync
          image: "{{ .Values.rsync.image.repository }}{{- if .Values.rsync.image.tag }}:{{ .Values.rsync.image.tag }}{{- end }}"
          imagePullPolicy: {{ .Values.rsync.image.pullPolicy }}
          env:
            - name: TZ
              value: "{{ .Values.timezone }}"
            {{- range $key, $value := .Values.rsync.environment }}
            {{- if $value }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          {{- if .Values.rsync.command }}
          command:
            {{- toYaml .Values.rsync.command | nindent 12 }}
          {{- end }}
          {{- $mounts := list }}
          {{- range .Values.rsync.mounts }}
          {{- if .claimName }}
          {{- $mounts = append $mounts . }}
          {{- end }}
          {{- end }}
          {{- if $mounts }}
          volumeMounts:
            {{- range $mounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.rsync.resources | nindent 12 }}
      {{- $mounts := list }}
      {{- range .Values.rsync.mounts }}
      {{- if .claimName }}
      {{- $mounts = append $mounts . }}
      {{- end }}
      {{- end }}
      {{- if $mounts }}
      volumes:
        {{- range $mounts }}
        - name: {{ .name }}
          persistentVolumeClaim:
            claimName: {{ .claimName }}
        {{- end }}
      {{- end }}
      {{- with .Values.rsync.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rsync.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.rsync.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
