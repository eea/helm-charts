{{- if .Values.debug.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: debug
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      component: debug
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        component: debug
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      containers:
        - name: debug
          image: "{{ .Values.debug.image.repository }}:{{ .Values.debug.image.tag }}"
          imagePullPolicy: {{ .Values.debug.image.pullPolicy }}
          args:
            - cat
          stdin: true
          tty: true
          env:
{{ include "cca-backend.backendEnv" (dict "root" . "component" (dict "environment" .Values.debug.environment "releaseVersion" .Values.releaseVersion)) | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          {{- $mounts := include "cca-backend.sharedVolumeMounts" . | trim }}
          {{- if $mounts }}
          volumeMounts:
{{ $mounts | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.debug.resources | nindent 12 }}
      {{- $volumes := include "cca-backend.sharedVolumes" . | trim }}
      {{- if $volumes }}
      volumes:
{{ $volumes | nindent 8 }}
      {{- end }}
      {{- with .Values.debug.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.debug.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.debug.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
