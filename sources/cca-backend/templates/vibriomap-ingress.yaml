{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cca-vibriomap
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: cca-vibriomap
  annotations:
    nginx.ingress.kubernetes.io/configuration-snippet: |
      rewrite ^/@@vibriomap-view-simple$ /VirtualHostBase/https/{{ .Values.plone.hostname }}:443/{{ .Values.plone.site }}/VirtualHostRoot/@@vibriomap-view-simple break;
{{ include "cca-backend.ingressCommonConfigurationSnippet" . | indent 6 }}
{{ include "cca-backend.ingressSecurityHeaders" . | indent 6 }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.plone.hostname }}
      http:
        paths:
          - path: /@@vibriomap-view-simple
            pathType: Exact
            backend:
              service:
                name: {{ .Values.varnish.serviceName }}
                port:
                  number: {{ .Values.varnish.port }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.plone.hostname }}
      {{- if .Values.ingress.certificate }}
      secretName: {{ .Values.ingress.certificate }}
      {{- end }}
  {{- end }}
{{- end }}
