{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cca-admin
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: cca-admin
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /VirtualHostBase/https/{{ .Values.plone.hostname }}:443/{{ .Values.plone.site }}/VirtualHostRoot/_vh_admin/$1
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/configuration-snippet: |
{{ include "cca-backend.ingressCommonConfigurationSnippet" . | indent 6 }}
{{ include "cca-backend.ingressSecurityHeaders" . | indent 6 }}
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.plone.hostname }}
      http:
        paths:
          - path: /_admin(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.varnish.serviceName }}
                port:
                  number: {{ .Values.varnish.port }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.plone.hostname }}
      {{- if .Values.ingress.certificate }}
      secretName: {{ .Values.ingress.certificate }}
      {{- end }}
  {{- end }}
{{- end }}
