{{- if .Values.converter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: converter
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: converter
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      component: converter
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        component: converter
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      containers:
        - name: converter
          image: "{{ .Values.converter.image.repository }}:{{ .Values.converter.image.tag }}"
          imagePullPolicy: {{ .Values.converter.image.pullPolicy }}
          env:
            - name: TZ
              value: "{{ .Values.timezone }}"
          resources:
            {{- toYaml .Values.converter.resources | nindent 12 }}
      {{- with .Values.converter.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.converter.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.converter.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
