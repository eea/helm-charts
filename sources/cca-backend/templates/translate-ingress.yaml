{{- if and .Values.ingress.enabled .Values.ploneTranslate.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cca-translate
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: cca-translate
  annotations:
    nginx.ingress.kubernetes.io/configuration-snippet: |
      rewrite ^/@@(translate-callback|save-etranslation|call-etranslation|sync-translated-paths)(.*)$ /VirtualHostBase/https/{{ .Values.plone.hostname }}:443/{{ .Values.plone.site }}/VirtualHostRoot/@@$1$2 break;
{{ include "cca-backend.ingressCommonConfigurationSnippet" . | indent 6 }}
{{ include "cca-backend.ingressSecurityHeaders" . | indent 6 }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.plone.hostname }}
      http:
        paths:
          - path: /@@(translate-callback|save-etranslation|call-etranslation|sync-translated-paths)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.ploneTranslate.serviceName }}
                port:
                  number: 8080
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.plone.hostname }}
      {{- if .Values.ingress.certificate }}
      secretName: {{ .Values.ingress.certificate }}
      {{- end }}
  {{- end }}
{{- end }}
