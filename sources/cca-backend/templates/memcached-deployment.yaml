{{- if .Values.memcached.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memcached
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: memcached
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      component: memcached
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        component: memcached
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      containers:
        - name: memcached
          image: "{{ .Values.memcached.image.repository }}:{{ .Values.memcached.image.tag }}"
          imagePullPolicy: {{ .Values.memcached.image.pullPolicy }}
          args:
            - -m
            - "{{ .Values.memcached.cacheSizeMi }}"
            - -I
            - "{{ .Values.memcached.slabPageSize }}"
          env:
            - name: TZ
              value: "{{ .Values.timezone }}"
          ports:
            - name: memcache
              containerPort: 11211
          {{- if .Values.memcached.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.memcached.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.memcached.startupProbe }}
          startupProbe:
            {{- toYaml .Values.memcached.startupProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.memcached.resources | nindent 12 }}
      {{- with .Values.memcached.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.memcached.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.memcached.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
