questions:
  - variable: "plone.hostname"
    label: "Server name"
    description: "DNS name for this deployment"
    default: "climate-adapt.eea.europa.eu"
    type: "string"
    required: true
    group: "General"

  - variable: "plone.site"
    label: "Site name"
    default: "cca"
    type: "string"
    required: true
    group: "General"

  - variable: "ingress.enabled"
    label: "Enable backend ingress"
    description: "Enable direct backend admin/api ingresses"
    default: false
    type: "boolean"
    required: true
    group: "General"

  - variable: "ingress.tls"
    label: "Enable https"
    default: true
    type: "boolean"
    required: true
    group: "General"
    show_if: "ingress.enabled=true"

  - variable: "ingress.certificate"
    label: "Certificate name"
    description: "TLS certificate secret name"
    default: "climate-adapt.eea.europa.eu-tls"
    type: "string"
    group: "General"
    show_if: "ingress.enabled=true"

  - variable: "links.createPostgresService"
    label: "Create postgres ExternalName service"
    description: "Set to false if a service named postgres already exists in the namespace"
    default: false
    type: "boolean"
    required: true
    group: "General"
    show_subquestion_if: true
    subquestions:
      - variable: "links.database"
        label: "PostgreSQL external service"
        description: "External PostgreSQL service, format SERVICE.NAMESPACE"
        default: "postgres.database"
        type: "string"
        required: true

  - variable: "plone.serviceType"
    label: "Expose plone"
    description: "Select NodePort to expose plone"
    type: "enum"
    options:
      - "NodePort"
      - "ClusterIP"
    default: "ClusterIP"
    required: true
    group: "General"

  - variable: "varnish.serviceType"
    label: "Expose varnish"
    description: "Select NodePort to expose varnish"
    type: "enum"
    options:
      - "NodePort"
      - "ClusterIP"
    default: "ClusterIP"
    required: true
    group: "General"

  - variable: "debug.enabled"
    label: "Debug"
    description: "Add backend debugging"
    default: false
    type: "boolean"
    required: true
    group: "General"

  - variable: "debug.serviceType"
    label: "Expose debug"
    description: "Select NodePort to expose debug"
    type: "enum"
    options:
      - "NodePort"
      - "ClusterIP"
    default: "ClusterIP"
    required: true
    group: "General"
    show_if: "debug.enabled=true"

  - variable: "plone.database.POSTGRES_DB"
    label: "PostgreSQL database name"
    type: "string"
    default: "datafs"
    required: true
    group: "Plone configuration"

  - variable: "plone.database.POSTGRES_USER"
    label: "PostgreSQL user name"
    type: "string"
    default: "zope"
    required: true
    group: "Plone configuration"

  - variable: "plone.database.POSTGRES_PASSWORD"
    label: "PostgreSQL password"
    type: "password"
    default: ""
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.SENTRY_DSN"
    label: "Sentry DSN"
    description: "If set, Sentry error reporting will be enabled"
    type: "string"
    default: ""
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.SENTRY_ENVIRONMENT"
    label: "Sentry environment"
    type: "string"
    default: "production"
    required: true
    group: "Plone configuration"

  - variable: "commonEnv.CORS_ALLOW_ORIGIN"
    label: "CORS allow origin"
    type: "string"
    default: ""
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.DEFAULT_PUBLISHER_cca"
    label: "Default publisher"
    type: "string"
    default: "EEA"
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.DEFAULT_ORGANISATIONS_cca"
    label: "Default organisations"
    type: "string"
    default: "EEA"
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.TRANSLATION_AUTH_TOKEN"
    label: "Translation auth token"
    description: "Used by translation-related services and jobs"
    type: "password"
    default: ""
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.PLONE_REGISTRY_YAML_CONTENT"
    label: "Plone Registry YAML"
    description: "Registry overrides in YAML format for collective.regenv"
    type: "multiline"
    default: ""
    required: false
    group: "Plone configuration"

  - variable: "plone.replicaCount"
    label: "Plone replicas"
    type: "int"
    default: 6
    required: true
    group: "General"

  - variable: "ploneAdmin.enabled"
    label: "Enable plone-admin"
    default: true
    type: "boolean"
    required: true
    group: "General"

  - variable: "ploneTranslate.enabled"
    label: "Enable plone-translate"
    default: true
    type: "boolean"
    required: true
    group: "General"

  - variable: "memcached.enabled"
    label: "Enable memcached"
    default: true
    type: "boolean"
    required: true
    group: "General"

  - variable: "rsync.enabled"
    label: "Enable rsync"
    default: false
    type: "boolean"
    required: true
    group: "General"

  - variable: "zodbpack.enabled"
    label: "Enable zodbpack"
    default: true
    type: "boolean"
    required: true
    group: "General"

  - variable: "zodbpack.schedule"
    label: "Zodbpack schedule"
    type: "string"
    default: "0 1 * * *"
    required: true
    group: "General"
    show_if: "zodbpack.enabled=true"

  - variable: "detectBrokenLinks.enabled"
    label: "Enable broken links cron"
    default: true
    type: "boolean"
    required: true
    group: "General"

  - variable: "detectBrokenLinks.schedule"
    label: "Broken links schedule"
    type: "string"
    default: "0 3 * * *"
    required: true
    group: "General"
    show_if: "detectBrokenLinks.enabled=true"

  - variable: "detectBrokenLinks.authToken"
    label: "Broken links auth token"
    type: "password"
    default: ""
    required: false
    group: "General"
    show_if: "detectBrokenLinks.enabled=true"

  - variable: "varnish.port"
    label: "Varnish port"
    description: "To simplify, we use the same port as the backend"
    type: "int"
    default: 8080
    required: true
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_SIZE"
    label: "Varnish cache size"
    type: "string"
    default: "2G"
    required: true
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_BERESP_TTL"
    label: "Varnish TTL"
    type: "string"
    default: "3600s"
    required: true
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_BERESP_GRACE"
    label: "Varnish grace"
    type: "string"
    default: "300s"
    required: true
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_BERESP_KEEP"
    label: "Varnish keep"
    type: "string"
    default: "120s"
    required: true
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_GZIP_ENABLED"
    label: "Enable gzip"
    type: "enum"
    default: "true"
    required: true
    options:
      - "false"
      - "true"
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_GZIP_JSON_ENABLED"
    label: "Enable gzip on json"
    type: "enum"
    default: "true"
    required: true
    options:
      - "false"
      - "true"
    group: "Varnish configuration"

  - variable: "postfix.mtpUser"
    label: "SMTP user"
    type: "string"
    default: "climate-adapt-usr"
    required: false
    group: "Notifications"

  - variable: "postfix.mtpPass"
    label: "SMTP password"
    type: "password"
    default: ""
    required: false
    group: "Notifications"

  - variable: "postfix.mtpRelay"
    label: "SMTP relay"
    type: "string"
    default: "ironports.eea.europa.eu"
    required: false
    group: "Notifications"

  - variable: "postfix.mtpPort"
    label: "SMTP port"
    type: "string"
    default: "8587"
    required: false
    group: "Notifications"
