questions:
  - variable: "plone.hostname"
    label: "Server name"
    description: "DNS name for this deployment"
    default: "climate-adapt.eea.europa.eu"
    type: "string"
    required: true
    group: "General"

  - variable: "plone.site"
    label: "Site name"
    default: "cca"
    type: "string"
    required: true
    group: "General"

  - variable: "ingress.tls"
    label: "Enable https"
    default: true
    type: "boolean"
    required: true
    group: "General"

  - variable: "ingress.certificate"
    label: "Certificate name"
    description: "TLS certificate secret name"
    default: "climate-adapt.eea.europa.eu-tls"
    type: "string"
    group: "General"

  - variable: "links.createPostgresService"
    label: "Create postgres and memcached ExternalName services"
    description: "Set to false if the services already exist in the namespace (e.g. from a database release)"
    default: false
    type: "boolean"
    required: true
    group: "General"
    show_subquestion_if: true
    subquestions:
      - variable: "links.database"
        label: "PostgreSQL external service"
        description: "External PostgreSQL service, format SERVICE.NAMESPACE"
        default: "postgres.database"
        type: "string"
        required: true
      - variable: "links.memcached"
        label: "Memcached external service"
        description: "External memcached service, format SERVICE.NAMESPACE"
        default: "memcached.database"
        type: "string"
        required: true

  - variable: "plone.serviceType"
    label: "Expose plone"
    description: "Select NodePort to expose plone"
    type: "enum"
    options:
      - "NodePort"
      - "ClusterIP"
    default: "ClusterIP"
    required: true
    group: "General"

  - variable: "varnish.serviceType"
    label: "Expose varnish"
    description: "Select NodePort to expose varnish"
    type: "enum"
    options:
      - "NodePort"
      - "ClusterIP"
    default: "ClusterIP"
    required: true
    group: "General"

  - variable: "debug.enabled"
    label: "Debug"
    description: "Add backend debugging"
    default: false
    type: "boolean"
    required: true
    group: "General"

  - variable: "debug.serviceType"
    label: "Expose debug"
    description: "Select NodePort to expose debug"
    type: "enum"
    options:
      - "NodePort"
      - "ClusterIP"
    default: "ClusterIP"
    required: true
    group: "General"
    show_if: "debug.enabled=true"

  - variable: "plone.database.POSTGRES_DB"
    label: "PostgreSQL database name"
    type: "string"
    default: "datafs"
    required: true
    group: "Plone configuration"

  - variable: "plone.database.POSTGRES_USER"
    label: "PostgreSQL user name"
    type: "string"
    default: "zope"
    required: true
    group: "Plone configuration"

  - variable: "plone.database.POSTGRES_PASSWORD"
    label: "PostgreSQL password"
    type: "password"
    default: ""
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.SENTRY_DSN"
    label: "Sentry DSN"
    description: "If set, Sentry error reporting will be enabled"
    type: "string"
    default: ""
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.SENTRY_ENVIRONMENT"
    label: "Sentry environment"
    type: "string"
    default: "production"
    required: true
    group: "Plone configuration"

  - variable: "commonEnv.CORS_ALLOW_ORIGIN"
    label: "CORS allow origin"
    type: "string"
    default: ""
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.DEFAULT_PUBLISHER_cca"
    label: "Default publisher"
    type: "string"
    default: "EEA"
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.DEFAULT_ORGANISATIONS_cca"
    label: "Default organisations"
    type: "string"
    default: "EEA"
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.TRANSLATION_AUTH_TOKEN"
    label: "Translation auth token"
    description: "Used by translation-related services and jobs"
    type: "password"
    default: ""
    required: false
    group: "Plone configuration"

  - variable: "commonEnv.PLONE_REGISTRY_YAML_CONTENT"
    label: "Plone Registry YAML"
    description: "Registry overrides in YAML format for collective.regenv"
    type: "multiline"
    default: ""
    required: false
    group: "Plone configuration"

  - variable: "plone.replicaCount"
    label: "Plone replicas"
    type: "int"
    default: 4
    required: true
    group: "General"

  - variable: "rsync.enabled"
    label: "Enable rsync"
    default: false
    type: "boolean"
    required: true
    group: "General"

  - variable: "zodbpack.enabled"
    label: "Enable zodbpack"
    default: true
    type: "boolean"
    required: true
    group: "General"

  - variable: "zodbpack.schedule"
    label: "Zodbpack schedule"
    type: "string"
    default: "0 1 * * *"
    required: true
    group: "General"
    show_if: "zodbpack.enabled=true"

  - variable: "detectBrokenLinks.enabled"
    label: "Enable broken links cron"
    default: true
    type: "boolean"
    required: true
    group: "General"

  - variable: "detectBrokenLinks.schedule"
    label: "Broken links schedule"
    type: "string"
    default: "0 3 * * *"
    required: true
    group: "General"
    show_if: "detectBrokenLinks.enabled=true"

  - variable: "detectBrokenLinks.authToken"
    label: "Broken links auth token"
    type: "password"
    default: ""
    required: false
    group: "General"
    show_if: "detectBrokenLinks.enabled=true"

  - variable: "entrasync.enabled"
    label: "Enable Entra Id synchronization"
    default: false
    type: "boolean"
    required: true
    group: "General"

  - variable: "entrasync.schedule"
    label: "Scheduled Entra ID synchronization time"
    type: "string"
    default: "0 0 3 * *"
    required: true
    group: "General"
    show_if: "entrasync.enabled=true"

  - variable: "varnish.port"
    label: "Varnish port"
    description: "To simplify, we use the same port as the backend"
    type: "int"
    default: 8080
    required: true
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_SIZE"
    label: "Varnish cache size"
    type: "string"
    default: "2G"
    required: true
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_BERESP_TTL"
    label: "Varnish TTL"
    type: "string"
    default: "3600s"
    required: true
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_BERESP_GRACE"
    label: "Varnish grace"
    type: "string"
    default: "300s"
    required: true
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_BERESP_KEEP"
    label: "Varnish keep"
    type: "string"
    default: "120s"
    required: true
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_GZIP_ENABLED"
    label: "Enable gzip"
    type: "enum"
    default: "true"
    required: true
    options:
      - "false"
      - "true"
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_GZIP_JSON_ENABLED"
    label: "Enable gzip on json"
    type: "enum"
    default: "true"
    required: true
    options:
      - "false"
      - "true"
    group: "Varnish configuration"

  - variable: "plone.resources.requests.memory"
    label: "Plone memory reservation"
    type: "string"
    required: true
    default: "6Gi"
    group: "Memory"

  - variable: "plone.resources.limits.memory"
    label: "Plone memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "6Gi"
    group: "Memory"

  - variable: "ploneTranslate.resources.requests.memory"
    label: "Translation memory reservation"
    type: "string"
    required: true
    default: "8Gi"
    group: "Memory"
    show_if: "ploneTranslate.enabled=true"

  - variable: "ploneTranslate.resources.limits.memory"
    label: "Translation memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "8Gi"
    group: "Memory"
    show_if: "ploneTranslate.enabled=true"

  - variable: "debug.resources.requests.memory"
    label: "Debug memory reservation"
    type: "string"
    required: true
    default: "1Gi"
    group: "Memory"
    show_if: "debug.enabled=true"

  - variable: "debug.resources.limits.memory"
    label: "Debug memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "4Gi"
    group: "Memory"
    show_if: "debug.enabled=true"

  - variable: "entrasync.resources.requests.memory"
    label: "Entrasync cron job memory reservation"
    type: "string"
    required: true
    default: "1Gi"
    group: "Memory"
    show_if: "entrasync.enabled=true"

  - variable: "entrasync.resources.limits.memory"
    label: "Entrasync memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "1Gi"
    group: "Memory"
    show_if: "entrasync.enabled=true"

  - variable: "varnish.resources.requests.memory"
    label: "Varnish memory reservation"
    type: "string"
    required: true
    default: "2Gi"
    group: "Memory"

  - variable: "varnish.resources.limits.memory"
    label: "Varnish memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "3Gi"
    group: "Memory"

  - variable: "async.resources.requests.memory"
    label: "Async translation memory reservation"
    type: "string"
    required: true
    default: "512Mi"
    group: "Memory"
    show_if: "async.enabled=true"

  - variable: "async.resources.limits.memory"
    label: "Async translation memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "1Gi"
    group: "Memory"
    show_if: "async.enabled=true"

  - variable: "converter.resources.requests.memory"
    label: "Converter memory reservation"
    type: "string"
    required: true
    default: "128Mi"
    group: "Memory"
    show_if: "converter.enabled=true"

  - variable: "converter.resources.limits.memory"
    label: "Converter memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "256Mi"
    group: "Memory"
    show_if: "converter.enabled=true"

  - variable: "redis.resources.requests.memory"
    label: "Redis memory reservation"
    type: "string"
    required: true
    default: "256Mi"
    group: "Memory"
    show_if: "redis.enabled=true"

  - variable: "redis.resources.limits.memory"
    label: "Redis memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "512Mi"
    group: "Memory"
    show_if: "redis.enabled=true"

  - variable: "zodbpack.resources.requests.memory"
    label: "Zodbpack cron job memory reservation"
    type: "string"
    required: true
    default: "8Gi"
    group: "Memory"
    show_if: "zodbpack.enabled=true"

  - variable: "zodbpack.resources.limits.memory"
    label: "Zodbpack cron job memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "8Gi"
    group: "Memory"
    show_if: "zodbpack.enabled=true"

  - variable: "detectBrokenLinks.resources.requests.memory"
    label: "Broken links cron memory reservation"
    type: "string"
    required: true
    default: "32Mi"
    group: "Memory"
    show_if: "detectBrokenLinks.enabled=true"

  - variable: "detectBrokenLinks.resources.limits.memory"
    label: "Broken links cron memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "64Mi"
    group: "Memory"
    show_if: "detectBrokenLinks.enabled=true"

  - variable: "memcachedflush.resources.requests.memory"
    label: "Memcached flush cron memory reservation"
    type: "string"
    required: true
    default: "32Mi"
    group: "Memory"
    show_if: "memcachedflush.enabled=true"

  - variable: "memcachedflush.resources.limits.memory"
    label: "Memcached flush cron memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "64Mi"
    group: "Memory"
    show_if: "memcachedflush.enabled=true"

  - variable: "rsync.resources.requests.memory"
    label: "Rsync memory reservation"
    type: "string"
    required: true
    default: "512Mi"
    group: "Memory"
    show_if: "rsync.enabled=true"

  - variable: "rsync.resources.limits.memory"
    label: "Rsync memory limit"
    description: ">= memory reservation"
    type: "string"
    required: true
    default: "1Gi"
    group: "Memory"
    show_if: "rsync.enabled=true"

  - variable: "postfix.serviceName"
    label: "Postfix service name"
    description: "Default is application full name ( application-postfix ) "
    default: ""
    type: "string"
    group: "Mail"

  - variable: "postfix.dryrun"
    label: "Run in development mode"
    description: "If checked, will not send emails, but use mailtrap to catch them"
    default: false
    type: "boolean"
    required: true
    show_subquestion_if: false
    group: "Mail"
    subquestions:
      - variable: "postfix.mtpRelay"
        label: "Postfix relay"
        required: true
        description: "Postfix SMTP relay"
        type: "string"
        default: "ironports.eea.europa.eu"
      - variable: "postfix.mtpPort"
        label: "Postfix relay port"
        description: "Postfix SMTP relay port"
        type: "int"
        required: true
        default: 8587
      - variable: "postfix.mtpUser"
        label: "Postfix user"
        description: "Without authentication, emails will not be sent"
        type: "string"
        required: true
      - variable: "postfix.mtpPass"
        label: "Postfix password"
        description: "Without authentication, emails will not be sent"
        type: "string"
        required: true
      - variable: "postfix.serverName"
        label: "Application url"
        type: "string"
        required: true

  - variable: "postfix.mailtrap.httpenabled"
    label: "Create mailtrap service for port 80"
    description: "Keep unchecked if you don't want to view the emails in a webinterface"
    type: "boolean"
    default: false
    required: true
    show_if: "postfix.dryrun"
    show_subquestion_if: true
    group: "Mail"
    subquestions:
      - variable: "postfix.mailtrap.serviceType"
        label: "Mailtrap service type"
        description: "Select NodePort to expose mailtrap on port"
        type: "enum"
        options:
          - "NodePort"
          - "ClusterIP"
        default: "NodePort"
        required: true
      - variable: "postfix.mailtrap.ingress.enabled"
        label: "Add mailtrap url in ingress"
        default: false
        type: "boolean"
        required: true

  - variable: "postfix.mailtrap.ingress.hostname"
    label: "Mailtrap URL"
    show_if: "postfix.mailtrap.ingress.enabled"
    required: true
    type: "string"
    default: "mailtrap-climate-adapt.eea.europa.eu"
    group: "Mail"

  - variable: "postfix.mailtrap.ingress.certificate"
    label: "Mailtrap certificate name"
    show_if: "postfix.mailtrap.ingress.enabled"
    description: "If empty, https will not be enabled"
    default: "mailtrap-climate-adapt.eea.europa.eu-tls"
    group: "Mail"
