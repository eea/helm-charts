imagePullSecrets: []

nameOverride: ''
fullnameOverride: ''

serviceAccount:
  create: false
  annotations: {}
  name: ''

timezone: Europe/Copenhagen

links:
  database: plone-postgres.namespace

ingress:
  frontend:
    enabled: true
    className: nginx
    letsencrypt: '01dev-eea-letsencrypt'
    annotations: {}
    host: dev-qc-copernicus.01dev.eea.europa.eu
    tls: true
    certificate: dev-qc-copernicus.01dev.eea.europa.eu-tls
  nextcloud:
    enabled: true
    className: nginx
    letsencrypt: '01dev-eea-letsencrypt'
    annotations: {}
    host: admin-qc-copernicus.eea.europa.eu
    tls: true
    certificate: admin-qc-copernicus.eea.europa.eu-tls

persistence:
  boundary:
    enabled: true
    create: true
    existingClaim: ''
    storageClassName: ''
    accessModes:
      - ReadWriteMany
    size: 5Gi
  incoming:
    enabled: true
    create: true
    existingClaim: ''
    storageClassName: ''
    accessModes:
      - ReadWriteMany
    size: 5Gi
  submission:
    enabled: true
    create: true
    existingClaim: ''
    storageClassName: ''
    accessModes:
      - ReadWriteMany
    size: 10Gi
  submissionEtc:
    enabled: true
    create: true
    existingClaim: ''
    storageClassName: ''
    accessModes:
      - ReadWriteMany
    size: 5Gi
  frontend:
    enabled: true
    create: true
    existingClaim: ''
    storageClassName: ''
    accessModes:
      - ReadWriteMany
    size: 5Gi
  work:
    enabled: true
    create: true
    existingClaim: ''
    storageClassName: ''
    accessModes:
      - ReadWriteMany
    size: 20Gi
  nextcloudAppData:
    enabled: true
    create: true
    existingClaim: ''
    storageClassName: ''
    accessModes:
      - ReadWriteOnce
    size: 20Gi
  mariadbData:
    enabled: true
    create: true
    existingClaim: ''
    storageClassName: ''
    accessModes:
      - ReadWriteOnce
    size: 30Gi
  redisData:
    enabled: true
    create: true
    existingClaim: ''
    storageClassName: ''
    accessModes:
      - ReadWriteOnce
    size: 5Gi
  volumeTesterData:
    enabled: false
    create: false
    existingClaim: ''
    storageClassName: ''
    accessModes:
      - ReadWriteOnce
    size: 1Gi

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: eeacms/copernicus-qctool-frontend
    tag: '2.4.0'
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  env:
    BOUNDARY_DIR: /mnt/qc_tool_boundary/boundaries
    CASE_INSENSITIVE_USERNAMES: 'yes'
    DB_ENGINE: postgres
    FRONTEND_DB_PATH: /mnt/qc_tool_frontend/frontend.sqlite3
    FRONTEND_PORT: '8000'
    INCOMING_DIR: /mnt/qc_tool_incoming/incoming
    MAINTENANCE_MODE: 'no'
    REFRESH_JOB_STATUSES_BACKGROUND: 'yes'
    REFRESH_JOB_STATUSES_BACKGROUND_INTERVAL: '60'
    SUBMISSION_DIR: /mnt/qc_tool_submission/submission
    UPDATE_JOB_STATUSES: 'yes'
    UPDATE_JOB_STATUSES_INTERVAL: '30000'
    WORK_DIR: /mnt/qc_tool_work/work
    WORKER_ALIVE_TIMEOUT: '30'
  extraEnv: {}
  database:
    port: 5432
    name: qc_tool
    user: qc_user
    password: ''
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

worker:
  enabled: true
  replicaCount: 8
  image:
    repository: eeacms/copernicus-qctool-worker
    tag: '2.4.0'
    pullPolicy: IfNotPresent
  env:
    BOUNDARY_DIR: /mnt/qc_tool_boundary/boundaries
    INCOMING_DIR: /mnt/qc_tool_incoming/incoming
    INSPIRE_SERVICE_URL: http://localhost:8080/validator/v2/
    WORK_DIR: /mnt/qc_tool_work/work
  extraEnv: {}
  pullJobUrl: ''
  shmSize: 1Gi
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

nextcloud:
  enabled: true
  replicaCount: 1
  image:
    repository: eeacms/nextcloud
    tag: '30.0.2-apache'
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  env:
    PHP_MEMORY_LIMIT: 512M
  extraEnv: {}
  healthcheck:
    path: /status.php
    host: ''
  configSync:
    enabled: true
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

nextcloudCron:
  enabled: true
  replicaCount: 1
  command:
    - /cron.sh
  env:
    PHP_MEMORY_LIMIT: 512M
  extraEnv: {}
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

postfix:
  fullnameOverride: ''
  dryrun: false
  serverName: dev-qc-copernicus.01dev.eea.europa.eu
  mtpPass: ''
  mtpPort: '8587'
  mtpRelay: ironport1.eea.europa.eu
  mtpUser: clms_qc_tool
  serviceName: 'postfix'
  mailtrap:
    httpenabled: false
    serviceType: ClusterIP
    mtUser: mailtrap
    mtPasswd: mailtrap # betterleaks:allow
    ingress:
      enabled: false
      hostname: mailtrap.01dev.eea.europa.eu
      annotations:
        cert-manager.io/cluster-issuer: 01dev-eea-letsencrypt
      certificate: mailtrap.01dev.eea.europa.eu-tls
  image:
    repository: eeacms/postfix
    tag: '3.5-1.0'
  timezone: Europe/Copenhagen
  resources:
    requests:
      memory: 128Mi
    limits:
      memory: 128Mi

volumeTester:
  enabled: false
  replicaCount: 1
  image:
    repository: ubuntu
    tag: '20.04'
    pullPolicy: IfNotPresent
  command:
    - sleep
    - infinity
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

mariadb:
  enabled: true
  replicaCount: 1
  image:
    repository: mariadb
    tag: '10.6.20'
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3306
    # Compatibility alias for existing Nextcloud configs that use dbhost "db".
    legacyName: db
  database:
    name: nextcloud
    user: nc
    password: ''
    rootPassword: ''
  args:
    - --transaction-isolation=READ-COMMITTED
    - --binlog-format=ROW
    - --innodb_read_only_compressed=OFF
  extraEnv: {}
  resources:
    requests:
      memory: 2Gi
    limits:
      memory: 2Gi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

redis:
  enabled: true
  replicaCount: 1
  image:
    repository: redis
    tag: '7.4.1-alpine'
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  args: []
  resources:
    requests:
      memory: 512Mi
    limits:
      memory: 512Mi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
