{{- if .Values.nextcloud.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qctool.nextcloudServiceName" . }}
  labels:
    {{- include "qctool.labels" . | nindent 4 }}
    component: nextcloud
spec:
  type: {{ .Values.nextcloud.service.type }}
  selector:
    {{- include "qctool.selectorLabels" . | nindent 4 }}
    component: nextcloud
  ports:
    - name: http
      port: {{ .Values.nextcloud.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}

