{{- if .Values.postfix.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qctool.postfixServiceName" . }}
  labels:
    {{- include "qctool.labels" . | nindent 4 }}
    component: postfix
spec:
  type: {{ .Values.postfix.service.type }}
  selector:
    {{- include "qctool.selectorLabels" . | nindent 4 }}
    component: postfix
  ports:
    - name: smtp
      port: {{ .Values.postfix.service.port }}
      targetPort: smtp
      protocol: TCP
{{- end }}

