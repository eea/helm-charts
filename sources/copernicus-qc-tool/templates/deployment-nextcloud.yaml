{{- if .Values.nextcloud.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qctool.nextcloudName" . }}
  labels:
    {{- include "qctool.labels" . | nindent 4 }}
    component: nextcloud
spec:
  replicas: {{ .Values.nextcloud.replicaCount }}
  selector:
    matchLabels:
      {{- include "qctool.selectorLabels" . | nindent 6 }}
      component: nextcloud
  template:
    metadata:
      labels:
        {{- include "qctool.selectorLabels" . | nindent 8 }}
        component: nextcloud
      {{- with .Values.nextcloud.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "qctool.serviceAccountName" . }}
      {{- if .Values.nextcloud.configSync.enabled }}
      initContainers:
        {{- include "qctool.nextcloudConfigSyncInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: nextcloud
          image: "{{ .Values.nextcloud.image.repository }}:{{ .Values.nextcloud.image.tag }}"
          imagePullPolicy: {{ .Values.nextcloud.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.nextcloud.service.port }}
              protocol: TCP
          env:
            - name: TZ
              value: {{ .Values.timezone | quote }}
            - name: MYSQL_DATABASE
              value: {{ .Values.mariadb.database.name | quote }}
            - name: MYSQL_USER
              value: {{ .Values.mariadb.database.user | quote }}
            - name: MYSQL_PASSWORD
              value: {{ .Values.mariadb.database.password | quote }}
            - name: MYSQL_HOST
              value: {{ include "qctool.mariadbServiceName" . | quote }}
            - name: REDIS_HOST
              value: {{ include "qctool.redisServiceName" . | quote }}
            - name: REDIS_HOST_PORT
              value: {{ .Values.redis.service.port | quote }}
            {{- $nextcloudDefaults := dict "NEXTCLOUD_TRUSTED_DOMAINS" (include "qctool.nextcloudTrustedDomains" .) }}
            {{- $env := mergeOverwrite (deepCopy $nextcloudDefaults) (deepCopy .Values.nextcloud.env) .Values.nextcloud.extraEnv }}
            {{- range $key := keys $env | sortAlpha }}
            - name: {{ $key }}
              value: {{ index $env $key | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.nextcloud.healthcheck.path | quote }}
              port: http
              httpHeaders:
                - name: Host
                  value: {{ default .Values.ingress.nextcloud.host .Values.nextcloud.healthcheck.host | quote }}
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.nextcloud.healthcheck.path | quote }}
              port: http
              httpHeaders:
                - name: Host
                  value: {{ default .Values.ingress.nextcloud.host .Values.nextcloud.healthcheck.host | quote }}
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: {{ .Values.nextcloud.healthcheck.path | quote }}
              port: http
              httpHeaders:
                - name: Host
                  value: {{ default .Values.ingress.nextcloud.host .Values.nextcloud.healthcheck.host | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          resources:
            {{- toYaml .Values.nextcloud.resources | nindent 12 }}
          volumeMounts:
            - name: submission
              mountPath: /mnt/qc_tool_submission
            - name: nextcloud-appdata
              mountPath: /var/www/html
            - name: submission-etc
              mountPath: /mnt/sp_data
      volumes:
        - name: submission
          persistentVolumeClaim:
            claimName: {{ include "qctool.claimName" (dict "root" . "name" "submission" "volume" .Values.persistence.submission) }}
        - name: nextcloud-appdata
          persistentVolumeClaim:
            claimName: {{ include "qctool.claimName" (dict "root" . "name" "nextcloudAppData" "volume" .Values.persistence.nextcloudAppData) }}
        - name: submission-etc
          persistentVolumeClaim:
            claimName: {{ include "qctool.claimName" (dict "root" . "name" "submissionEtc" "volume" .Values.persistence.submissionEtc) }}
      {{- with .Values.nextcloud.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nextcloud.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nextcloud.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
