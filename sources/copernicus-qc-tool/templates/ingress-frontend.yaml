{{- if and .Values.frontend.enabled .Values.ingress.frontend.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "qctool.frontendName" . }}
  labels:
    {{- include "qctool.labels" . | nindent 4 }}
    component: frontend
  {{- if or .Values.ingress.frontend.letsencrypt .Values.ingress.frontend.annotations }}
  annotations:
    {{- if .Values.ingress.frontend.letsencrypt }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.frontend.letsencrypt | quote }}
    {{- end }}
    {{- with .Values.ingress.frontend.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.frontend.className }}
  ingressClassName: {{ .Values.ingress.frontend.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.frontend.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "qctool.frontendServiceName" . }}
                port:
                  number: {{ .Values.frontend.service.port }}
  {{- if .Values.ingress.frontend.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.frontend.host | quote }}
      {{- if .Values.ingress.frontend.certificate }}
      secretName: {{ .Values.ingress.frontend.certificate | quote }}
      {{- end }}
  {{- end }}
{{- end }}

