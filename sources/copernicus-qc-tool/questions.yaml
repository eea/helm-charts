questions:
  - variable: "timezone"
    label: "Timezone"
    type: "string"
    default: "Europe/Copenhagen"
    required: true
    group: "General"

  - variable: "links.database"
    label: "PostgreSQL service"
    description: "External PostgreSQL service, format SERVICE.NAMESPACE"
    type: "string"
    default: "plone-postgres.namespace"
    required: true
    group: "General"

  - variable: "frontend.database.name"
    label: "PostgreSQL database"
    type: "string"
    default: "qc_tool"
    required: true
    group: "General"

  - variable: "frontend.database.user"
    label: "PostgreSQL user"
    type: "string"
    default: "qc_user"
    required: true
    group: "General"

  - variable: "frontend.database.port"
    label: "PostgreSQL port"
    type: "int"
    default: 5432
    required: true
    group: "General"

  - variable: "frontend.database.password"
    label: "PostgreSQL password"
    type: "password"
    default: ""
    required: true
    group: "General"

  - variable: "frontend.image.tag"
    label: "Frontend image tag"
    type: "string"
    default: "2.4.0"
    group: "Frontend"

  - variable: "worker.image.tag"
    label: "Worker image tag"
    type: "string"
    default: "2.4.0"
    group: "Worker"

  - variable: "nextcloud.image.tag"
    label: "Nextcloud image tag"
    type: "string"
    default: "30.0.2-apache"
    group: "Nextcloud"

  - variable: "mariadb.database.password"
    label: "MariaDB password"
    type: "password"
    default: ""
    required: true
    group: "Database"

  - variable: "mariadb.database.rootPassword"
    label: "MariaDB root password"
    type: "password"
    default: ""
    required: true
    group: "Database"

  - variable: "postfix.dryrun"
    label: "Run in development mode"
    description: "If checked, will not send emails, but use mailtrap to catch them"
    default: false
    type: "boolean"
    required: true
    show_subquestion_if: false
    group: "Mail"
    subquestions:
      - variable: "postfix.mtpRelay"
        label: "Postfix relay"
        required: true
        description: "Postfix SMTP relay"
        type: "string"
        default: "ironport1.eea.europa.eu"
      - variable: "postfix.mtpPort"
        label: "Postfix relay port"
        description: "Postfix SMTP relay port"
        type: "int"
        required: true
        default: 8587
      - variable: "postfix.mtpUser"
        label: "Postfix user"
        description: "Without authentication, emails will not be sent"
        type: "string"
        required: true
        default: "clms_qc_tool"
      - variable: "postfix.mtpPass"
        label: "Postfix password"
        description: "Without authentication, emails will not be sent"
        type: "password"
        default: ""
        required: true
      - variable: "postfix.serverName"
        label: "Application URL"
        type: "string"
        required: true
        default: "dev-qc-copernicus.01dev.eea.europa.eu"

  - variable: "postfix.mailtrap.httpenabled"
    label: "Create mailtrap service for port 80"
    description: "Keep unchecked if you don't want to view the emails in a web interface"
    type: "boolean"
    default: false
    required: true
    show_if: "postfix.dryrun"
    show_subquestion_if: true
    group: "Mail"
    subquestions:
      - variable: "postfix.mailtrap.serviceType"
        label: "Mailtrap service type"
        description: "Select NodePort to expose mailtrap on port"
        type: "enum"
        options:
          - "NodePort"
          - "ClusterIP"
        default: "ClusterIP"
        required: true
      - variable: "postfix.mailtrap.ingress.enabled"
        label: "Add mailtrap URL in ingress"
        default: false
        type: "boolean"
        required: true
      - variable: "postfix.mailtrap.mtUser"
        label: "Mailtrap web UI user"
        default: "mailtrap"
        type: "string"
      - variable: "postfix.mailtrap.mtPasswd"
        label: "Mailtrap web UI password"
        default: "mailtrap"
        type: "password"

  - variable: "postfix.mailtrap.ingress.hostname"
    label: "Mailtrap URL"
    show_if: "postfix.mailtrap.ingress.enabled"
    required: true
    type: "string"
    default: "mailtrap.01dev.eea.europa.eu"
    group: "Mail"

  - variable: "postfix.mailtrap.ingress.certificate"
    label: "Mailtrap certificate name"
    show_if: "postfix.mailtrap.ingress.enabled"
    description: "If empty, https will not be enabled"
    default: "mailtrap.01dev.eea.europa.eu-tls"
    group: "Mail"

  - variable: "frontend.replicaCount"
    label: "Frontend replicas"
    type: "int"
    default: 1
    required: true
    group: "Frontend"

  - variable: "worker.replicaCount"
    label: "Worker replicas"
    type: "int"
    default: 8
    required: true
    group: "Worker"

  - variable: "ingress.frontend.enabled"
    label: "Enable frontend ingress"
    type: "boolean"
    default: true
    required: true
    group: "Ingress"

  - variable: "ingress.frontend.host"
    label: "Frontend hostname"
    type: "string"
    default: "dev-qc-copernicus.01dev.eea.europa.eu"
    required: true
    group: "Ingress"
    show_if: "ingress.frontend.enabled=true"

  - variable: "ingress.frontend.certificate"
    label: "Frontend certificate"
    type: "string"
    default: "dev-qc-copernicus.01dev.eea.europa.eu-tls"
    group: "Ingress"
    show_if: "ingress.frontend.enabled=true&&ingress.frontend.tls=true"

  - variable: "ingress.nextcloud.enabled"
    label: "Enable nextcloud ingress"
    type: "boolean"
    default: true
    required: true
    group: "Ingress"

  - variable: "ingress.nextcloud.host"
    label: "Nextcloud hostname"
    type: "string"
    default: "admin-qc-copernicus.eea.europa.eu"
    required: true
    group: "Ingress"
    show_if: "ingress.nextcloud.enabled=true"

  - variable: "ingress.nextcloud.certificate"
    label: "Nextcloud certificate"
    type: "string"
    default: "admin-qc-copernicus.eea.europa.eu-tls"
    group: "Ingress"
    show_if: "ingress.nextcloud.enabled=true&&ingress.nextcloud.tls=true"
