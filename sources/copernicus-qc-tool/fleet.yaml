namespace: qc-tool

helm:
  releaseName: copernicus-qc-tool
  chart: "copernicus-qc-tool"
  repo: "https://eea.github.io/helm-charts"
  version: "0.1.0"
  force: true
  timeoutSeconds: 0
  values:
    links:
      database: postgres-postgres.database
    secrets:
      existingSecret: qc-tool-secrets
    ingress:
      frontend:
        host: dev-qc-copernicus.01dev.eea.europa.eu
        certificate: dev-qc-copernicus.01dev.eea.europa.eu-tls
      nextcloud:
        host: admin-qc-copernicus.eea.europa.eu
        certificate: admin-qc-copernicus.eea.europa.eu-tls
    volumeTester:
      enabled: false
