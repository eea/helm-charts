{{- if .Values.cerebro.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-cerebro
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: cerebro
spec:
  type: {{ .Values.cerebro.service.type }}
  selector:
    {{- include "appl.selectorLabels" . | nindent 4 }}
    component: cerebro
  ports:
  - name: http
    port: {{ .Values.cerebro.service.port }}
    targetPort: 9000
{{- end }}
