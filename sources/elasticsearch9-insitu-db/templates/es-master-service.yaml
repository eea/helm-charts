apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-master
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: master
spec:
  clusterIP: None
  selector:
    {{- include "appl.selectorLabels" . | nindent 4 }}
    component: master
  ports:
  - name: transport
    port: 9300
    targetPort: 9300
