apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: worker
spec:
  clusterIP: None
  selector:
    {{- include "appl.selectorLabels" . | nindent 4 }}
    component: worker
  ports:
  - name: transport
    port: 9300
    targetPort: 9300
