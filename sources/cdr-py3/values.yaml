image:
  repository: eeacms/reportek-cdr
  pullPolicy: IfNotPresent
  tag: ""

timezone: Europe/Copenhagen

defaultNetworkPolicyDeny:
  enabled: false

instance:
  replicaCount: 2
  port: 8080
  resources:
    requests:
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 2Gi
  livenessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 20
    failureThreshold: 3
    timeoutSeconds: 6
  readinessProbe:
  networkPolicy:
    enabled: false
    egress:
      ipBlockRules: []
        # - cidr: 10.50.4.0/24  # Example: Legacy service network
        #   ports:
        #     - protocol: TCP
        #       port: 443     # HTTPS
        #     - protocol: TCP
        #       port: 80      # HTTP
      rawRules: []
        # - to:
        #     - namespaceSelector:
        #         matchLabels:
        #           kubernetes.io/metadata.name: other-namespace
        #       podSelector:
        #         matchLabels:
        #           app.kubernetes.io/name: service-name
        #   ports:
        #     - port: 8080
        #       protocol: TCP
  env:
    beakerSecret: ""
    useBeakerSession: "1"
    redisUrl: "redis://cdr-py3-valkey:6379/0"
    sentryDSN: ""
    sentrySite: "cdr.eionet.europa.eu"
    sentryEnvironment: "production"
    zopeThreads: 4
    zopeDebugMode: "off"
    eventLogLevel: "INFO"
    pythonFaulthandler: ""
    deploymentHost: cdr.eionet.europa.eu
    cachePurgingDomain: cdr.eionet.europa.eu
    cachePurgingEnabled: true
    cachePurgingProxy: http://cdr-py3-varnish
    cachePurgingProxyPort: 8080
    cachePurgingVhost: true
    cacheSettingsEnabled: true
    clamavHost: cdr-py3-clamav
    graylog: ""
    graylogFacility: ""
    rabbitmqEnabled: true
    rabbitmqHost: ""
    rabbitmqUser: ""
    rabbitmqPass: ""
    rabbitmqPort: 5672
    zipCacheEnabled: true
    zipCachePath: /opt/zope/var
    zipCacheThreshold: "100000000"
    zeoAddress: cdr-py3-zeoserver:8100
    localConvertersHost: cdr-py3-local-converters
    blobStorageCacheVolumeEnabled: true
    blobStorageCacheVolumeSize: 1Gi
    zeoClientCacheSize: 128MB
    zeoClientBlobCacheSize: 512MB
    # Set to "on" to mount the ZEO server's PVC directly into the instance pod
    # at /opt/zope/var/blobstorage (subPath: blobstorage) and have Zope read
    # blobs from the shared filesystem instead of streaming them over ZEO.
    # Requires zeoserver.accessMode: ReadWriteMany and
    # blobStorageCacheVolumeEnabled: false. Enforced at template render time.
    zeoSharedBlobDir: "off"
    sessionManagerTimeout: 3600 # How long till a session expires in minutes
    sessionCookieExpires: "false" # true = expire on browser close, false = never expire, or seconds
    # Comma-separated list of memcached servers used as a backend cache for LDAP
    # lookups (host:port). Leave empty to omit LDAP_MEMCACHED_SERVERS from the
    # instance environment. When memcached.enabled=true, point this at the
    # in-cluster memcached service, e.g. "cdr-py3-memcached:11211".
    ldapMemcachedServers: ""

cronzeopack:
  enabled: false
  repository: eeacms/reportek.zeoserver
  tag: "z5-1.0"
  schedule: "0 3 * * *"
  resources:
    requests:
      memory: 1Gi
    limits:
      memory: 1Gi

cronautoenvcleanup:
  enabled: false
  schedule: "45 3 * * *"
  resources:
    requests:
      memory: 2.5Gi
    limits:
      memory: 3Gi

cronautocleanup:
  enabled: false
  schedule: "0 0 1 */3 *"
  resources:
    requests:
      memory: 5Gi
    limits:
      memory: 5Gi

cronautofallin:
  enabled: false
  schedule: "*/5 * 16 11 *"
  env:
    scheduleStart: ""
    schedulePeriod: ""
  resources:
    requests:
      memory: 2.5Gi
    limits:
      memory: 3Gi

cronzipcachecleanup:
  enabled: true
  schedule: "0 0 4 * *"
  resources:
    requests:
      memory: 2.5Gi
    limits:
      memory: 3Gi

zeoserver:
  image:
    tag: "z5-1.0"
  storage: 10Gi
  storageName: cdr-py3-storage
  zeoUid: 1000
  zeoGid: 1000
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
  resources:
    requests:
      memory: 1Gi

varnish:
  enabled: true
  varnishHTTPPort: 8080
  varnishSize: 5G
  varnishBackend: cdr-py3-instance
  varnishBackendPort: 8080
  resources:
    requests:
      memory: 5Gi
    limits:
      memory: 5Gi
  livenessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 20
    failureThreshold: 3
    timeoutSeconds: 6

local-converters:
  enabled: true
  resources:
    requests:
      memory: 1.5Gi
      cpu: 300m
    limits:
      memory: 1.5Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 2
    targetMemoryUtilizationPercentage: 80

clamav:
  enabled: true
  resources:
    requests:
      memory: 3.5Gi
      cpu: 300m
    limits:
      memory: 3.5Gi
      cpu: 1
  storage: 1Gi
  storageName: cdr-py3-clamav-data
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

rabbitmq:
  create: false
  name: rabbitmq
  externalName: ""

imagePullSecrets: []
nameOverride: ""
# Pin the in-cluster resource name prefix. Without this, a release named e.g.
# "cdr-prod" would render "cdr-prod-cdr-py3-*" because the release name doesn't
# contain the chart name "cdr-py3" as a substring.
fullnameOverride: "cdr-py3"

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8080

cron:
  enabled: true

webforms:
  - name: webforms
    enabled: false
    # Path exposed on the public ingress (chart adds the rewrite for nginx and PathPrefix for gatewayAPI)
    publicPath: /webforms
    proxyBodySize: "10m"
    # The external service is proxied via an in-cluster nginx pod
    upstream:
      host: webforms.eionet.europa.eu
      sslVerify: true
      readTimeout: "60"
      sendTimeout: "60"
      forwardClientIP: true
      forwardHost: true

ingress:
  enabled: false
  type: nginx  # Options: 'nginx' or 'gatewayAPI'

  hostname: cdr.eionet.europa.eu
  tlsSecretName: ""

  proxyBodySize: "1024m"
  proxyReadTimeout: "480"
  proxySendTimeout: "120"

  paths:
    - path: /
      pathType: ImplementationSpecific
      backendServiceName: "" # defaults to {{ fullname }}-varnish
      backendPort: 8080

  rateLimit:
    enabled: false
    rps: 30
    burst: 150
    rpm: 1800
    connections: 50
    whitelist: ""

  responseHeaders:
    - name: X-Frame-Options
      value: SAMEORIGIN
    - name: Strict-Transport-Security
      value: "max-age=15768000"
    - name: Server
      value: HTTPS
    - name: X-Content-Type-Options
      value: nosniff
    - name: Referrer-Policy
      value: strict-origin-when-cross-origin
    - name: Feature-Policy
      value: "accelerometer 'none'; ambient-light-sensor 'none'; autoplay 'none'; camera 'none'; encrypted-media 'none'; fullscreen 'self'; geolocation 'none'; gyroscope 'none'; magnetometer 'none'; microphone 'none'; midi 'none'; payment 'none'; picture-in-picture 'none'; speaker 'none'; sync-xhr 'self'; usb 'none'; vr 'none'"
    - name: X-XSS-Protection
      value: "1; mode=block"
    - name: Content-Security-Policy
      value: "default-src 'self' blob: data: https://*.eea.europa.eu https://*.eionet.europa.eu; connect-src 'self' https://*.openstreetmap.org https://*.eea.europa.eu https://*.eionet.europa.eu http://*.eea.europa.eu; font-src 'self' data: https://cdnjs.cloudflare.com/ https://fonts.gstatic.com/ https://*.eea.europa.eu https://*.eionet.europa.eu; frame-src 'self'  https://ec.europa.eu/  https://*.eea.europa.eu https://*.eionet.europa.eu http://*.eea.europa.eu; img-src http: https: blob: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https://matomo.eea.europa.eu https://openlayers.org/ https://www.google.com/jsapi https://www.google.com/uds/ https://www.gstatic.com/ https://spreadsheets.google.com/ https://docs.google.com/ https://*.eea.europa.eu https://*.eionet.europa.eu http://*.eea.europa.eu https://cdnjs.cloudflare.com https://code.jquery.com; style-src 'self' 'unsafe-inline' https://openlayers.org/ https://www.google.com/uds/ https://ajax.googleapis.com/ https://www.gstatic.com/ https://*.eionet.europa.eu https://*.eea.europa.eu https://cdnjs.cloudflare.com https://code.jquery.com"

  nginx:
    className: "nginx"
    annotationPrefix: "nginx.ingress.kubernetes.io"
    extraAnnotations: {}

  gatewayAPI:
    gatewayName: traefik-gateway
    gatewayNamespace: ""
    sectionName: websecure

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

memcached:
  enabled: false
  image:
    repository: memcached
    tag: 1.6.34-alpine
    pullPolicy: IfNotPresent
  maxMemory: 64
  livenessProbe:
    tcpSocket:
      port: memcached
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    tcpSocket:
      port: memcached
    initialDelaySeconds: 5
    periodSeconds: 10
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 128Mi

valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: 7.2.5-alpine
    pullPolicy: IfNotPresent
  env: []
  livenessProbe:
    tcpSocket:
      port: valkey
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    tcpSocket:
      port: valkey
    initialDelaySeconds: 5
    periodSeconds: 10
  persistence:
    enabled: false
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
