{{- if .Values.memcached.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appl.fullname" . }}-memcached
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    app.kubernetes.io/component: memcached
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: memcached
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: memcached
    spec:
      containers:
        - name: memcached
          image: "{{ .Values.memcached.image.repository }}:{{ .Values.memcached.image.tag }}"
          imagePullPolicy: {{ .Values.memcached.image.pullPolicy }}
          args:
            - "-m"
            - "{{ .Values.memcached.maxMemory }}"
          ports:
            - name: memcached
              containerPort: 11211
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.memcached.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.memcached.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.memcached.resources | nindent 12 }}
{{- end }}
