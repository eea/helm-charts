{{- if and .Values.cron.enabled .Values.cronautoenvcleanup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "appl.fullname" . }}-cron-auto-env-cleanup
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    app.kubernetes.io/component: job

spec:
  schedule: "{{ .Values.cronautoenvcleanup.schedule }}"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 8 }}
          {{- end }}
          serviceAccountName: {{ include "appl.serviceAccountName" . }}

          containers:
          - name: {{ include "appl.fullname" . }}
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            resources:
              {{- toYaml .Values.cronautoenvcleanup.resources | nindent 14 }}
            # Pass via args so the image entrypoint runs first and generates
            # /opt/zope/etc/zodb.conf before zconsole tries to read it.
            args:
            - bash
            - -c
            - |
              /opt/zope/bin/zconsole run /opt/zope/etc/zope.conf /opt/zope/bin/auto_env_cleanup \
                --inactive_for 30 \
                --limit 10
            envFrom:
            - configMapRef:
                name: {{ include "appl.fullname" . }}-instance-env
            - secretRef:
                name: {{ include "appl.fullname" . }}-instance-env
          restartPolicy: Never
{{- end }}
