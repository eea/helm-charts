{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "appl.fullname" . }}-valkey
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: valkey
      protocol: TCP
      name: valkey
  selector:
    {{- include "appl.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
{{- end }}
