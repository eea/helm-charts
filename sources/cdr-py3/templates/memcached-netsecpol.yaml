{{- if and .Values.defaultNetworkPolicyDeny.enabled .Values.memcached.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "appl.fullname" . }}-memcached
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: memcached

  policyTypes:
  - Ingress

  ingress:
    # Allow ingress from any pod in this release (instance pods and cron jobs).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 11211
{{- end }}
