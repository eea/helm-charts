apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-config
data:
  default.conf: |
    # Real IP handling (Docker/K8s)
    set_real_ip_from 172.17.0.0/16;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    # --- Logging ---
    # Access log with total + upstream timings (seconds)
    log_format graylog_strict_timed
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        '$request_time $upstream_response_time';
    access_log /var/log/nginx/access.log graylog_strict_timed;

    server {
        listen {{ .Values.matomo.environment.NGINX_HTTP_PORT_NUMBER }};
        server_name _;

        client_body_timeout 1800s;
        client_header_timeout 1800s;
        keepalive_timeout 1800s;
        send_timeout 1800s;

        root /var/www/html;
        index index.php;

        location ~ /(config|tmp|core|lang) {
            deny all;
            return 403;
        }

        location ~ /\.ht {
            deny all;
            return 403;
        }

        location = /misc/GeoLite2-City.mmdb {
            deny all;
            return 403;
        }

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            fastcgi_read_timeout 1800s;
            fastcgi_send_timeout 1800s;
            fastcgi_connect_timeout 1800s;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires max;
            log_not_found off;
        }
    }
