{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "matrix-webhook.fullname" . }}
  labels:
    {{- include "matrix-webhook.labels" . | nindent 4 }}
type: Opaque
stringData:
  matrix-token: {{ required "matrix.token is required (or set existingSecret)" .Values.matrix.token | quote }}
  webhook-key: {{ required "webhookKey is required (or set existingSecret)" .Values.webhookKey | quote }}
{{- end }}
