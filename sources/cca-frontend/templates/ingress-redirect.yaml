{{- $labels := (include "appl.labels" .) -}}
{{- $hostname := .Values.volto.hostname -}}
{{- $serviceName := .Values.varnish.serviceName -}}
{{- $servicePort := .Values.varnish.port -}}
{{- range $index, $redirect := .Values.ingressredirects }}
{{- if $redirect.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cca-redirect-{{ $index }}
  labels:
    {{- $labels | nindent 4 }}
    component: cca-frontend
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: https://{{ $hostname }}
  {{- with $redirect.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ $redirect.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $serviceName }}
                port:
                  number: {{ $servicePort }}
  {{- if $redirect.tls }}
  tls:
    - hosts:
        - {{ $redirect.hostname }}
      {{- if $redirect.certificate }}
      secretName: {{ $redirect.certificate }}
      {{- end }}
  {{- end }}
---
{{- end }}
{{- end }}
