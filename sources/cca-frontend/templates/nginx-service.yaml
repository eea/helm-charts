apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.nginx.serviceName }}
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: nginx
spec:
  type: {{ .Values.nginx.serviceType }}
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    {{- include "appl.selectorLabels" . | nindent 4 }}
    component: nginx
