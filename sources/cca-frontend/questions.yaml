questions:
  - variable: "volto.hostname"
    label: "Server name"
    description: "DNS name for this deployment"
    default: "climate-adapt.eea.europa.eu"
    type: "string"
    required: true
    group: "General"

  - variable: "links.backend"
    label: "Backend service"
    description: "Varnish backend service, format SERVICE.NAMESPACE"
    type: "string"
    required: true
    default: "backend-varnish.cca"
    group: "General"

  - variable: "ingress.tls"
    label: "Enable https"
    default: true
    type: "boolean"
    required: true
    group: "General"

  - variable: "ingress.certificate"
    label: "Certificate name"
    description: "TLS certificate secret name"
    default: "climate-adapt.eea.europa.eu-tls"
    type: "string"
    group: "General"

  - variable: "volto.serviceType"
    label: "Expose frontend"
    description: "Select NodePort to expose frontend"
    type: "enum"
    options:
      - "NodePort"
      - "ClusterIP"
    default: "ClusterIP"
    required: true
    group: "General"

  - variable: "varnish.serviceType"
    label: "Expose varnish"
    description: "Select NodePort to expose varnish"
    type: "enum"
    options:
      - "NodePort"
      - "ClusterIP"
    default: "ClusterIP"
    required: true
    group: "General"

  - variable: "debug.enabled"
    label: "Debug"
    description: "Add frontend debugging"
    default: false
    type: "boolean"
    required: true
    group: "General"

  - variable: "debug.serviceType"
    label: "Expose debug"
    description: "Select NodePort to expose debug"
    type: "enum"
    options:
      - "NodePort"
      - "ClusterIP"
    default: "ClusterIP"
    required: true
    group: "General"
    show_if: "debug.enabled=true"

  - variable: "volto.environment.RAZZLE_INTERNAL_API_PATH"
    label: "Internal API path"
    description: "Location of the backend API accessible from the frontend pod"
    default: "http://backend:8080/Plone"
    required: true
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_PUBLIC_URL"
    label: "Public URL"
    description: "Frontend public URL"
    default: "https://climate-adapt.eea.europa.eu"
    required: true
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_BACKEND_NAME"
    label: "Backend name"
    description: "Backend name exposed to the frontend build"
    default: "cca-backend"
    required: true
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_ALLOWED_CORS_DESTINATIONS"
    label: "Allowed CORS destinations"
    description: "Comma separated list of allowed destinations for the proxy"
    default: ""
    required: false
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_DEMO_SITE"
    label: "Demo site"
    description: "Enable demo-site mode"
    default: "false"
    required: true
    type: "enum"
    options:
      - "false"
      - "true"
    group: "Volto configuration"

  - variable: "volto.environment.SENTRY_URL"
    label: "Sentry URL"
    description: "Sentry base URL"
    type: "string"
    default: "https://sentry.eea.europa.eu"
    group: "Volto configuration"

  - variable: "volto.environment.SENTRY_AUTH_TOKEN"
    label: "Sentry auth token"
    description: "Authentication token for Sentry releases"
    type: "password"
    default: ""
    required: false
    group: "Volto configuration"

  - variable: "volto.environment.SENTRY_ORG"
    label: "Sentry organization"
    description: "Sentry organization name"
    default: "eea"
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.SENTRY_PROJECT"
    label: "Sentry project"
    description: "Sentry project name"
    default: "climate-adapt-eea-europa.eu"
    type: "string"
    required: false
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_MATOMO_URL"
    label: "Matomo URL"
    description: "Matomo base URL"
    type: "string"
    default: "https://matomo.eea.europa.eu/"
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_MATOMO_SITE_ID"
    label: "Matomo site id"
    description: "Matomo site identifier"
    type: "string"
    default: "13"
    required: false
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_PROXY_ES_DSN"
    label: "Default ES DSN"
    description: "Default Elasticsearch DSN"
    default: ""
    required: false
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_PROXY_ES_DSN_globalsearch"
    label: "ES DSN globalsearch"
    description: "Global Search Elasticsearch DSN"
    default: ""
    required: false
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_PROXY_ES_DSN_missionAll"
    label: "ES DSN missionAll"
    description: "Mission All Elasticsearch DSN"
    default: ""
    required: false
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_PROXY_QA_DSN_globalsearch"
    label: "QA DSN globalsearch"
    description: "Global Search QA/NLP DSN"
    default: ""
    required: false
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.RAZZLE_PROXY_QA_DSN_missionAll"
    label: "QA DSN missionAll"
    description: "Mission All QA/NLP DSN"
    default: ""
    required: false
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.DANSWER_URL"
    label: "Danswer URL"
    description: "External Danswer URL"
    default: "https://gptlab.eea.europa.eu"
    required: false
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.DANSWER_API_KEY"
    label: "Danswer API key"
    description: "API key for Danswer"
    default: ""
    required: false
    type: "password"
    group: "Volto configuration"

  - variable: "volto.environment.LLMGW_URL"
    label: "LLMGW URL"
    description: "LLM gateway URL"
    default: "https://llmgw.eea.europa.eu"
    required: false
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.LLMGW_TOKEN"
    label: "LLMGW token"
    description: "Token for LLM gateway"
    default: ""
    required: false
    type: "password"
    group: "Volto configuration"

  - variable: "volto.environment.ONYX_URL"
    label: "Onyx URL"
    description: "Onyx base URL"
    default: "https://aihub.eea.europa.eu/"
    required: false
    type: "string"
    group: "Volto configuration"

  - variable: "volto.environment.ONYX_API_KEY"
    label: "Onyx API key"
    description: "API key for Onyx"
    default: ""
    required: false
    type: "password"
    group: "Volto configuration"

  - variable: "volto.environment.VOLTO_ROBOTSTXT"
    label: "robots.txt"
    description: "Robots.txt content"
    type: "multiline"
    required: false
    group: "Volto configuration"

  - variable: "volto.environment.CSP_HEADER"
    label: "CSP Header"
    description: "Content Security Policy header value"
    type: "multiline"
    required: false
    group: "Volto configuration"

  - variable: "varnish.port"
    label: "Varnish port"
    description: "Port exposed by Varnish and used as backend port"
    type: "int"
    required: true
    default: 3000
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_SIZE"
    label: "Varnish cache size"
    type: "string"
    default: "2G"
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_BERESP_TTL"
    label: "Varnish TTL"
    description: "Object TTL"
    type: "string"
    default: "15s"
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_BERESP_GRACE"
    label: "Varnish grace"
    description: "Object grace period"
    type: "string"
    default: "100s"
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_BERESP_KEEP"
    label: "Varnish keep"
    description: "Object keep period"
    type: "string"
    default: "120s"
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_GZIP_ENABLED"
    label: "Enable gzip"
    type: "enum"
    default: "true"
    required: true
    options:
      - "false"
      - "true"
    group: "Varnish configuration"

  - variable: "varnish.environment.VARNISH_GZIP_JSON_ENABLED"
    label: "Enable gzip on json"
    type: "enum"
    default: "true"
    required: true
    options:
      - "false"
      - "true"
    group: "Varnish configuration"

  - variable: "varnish.environment.AUTOKILL_CRON"
    label: "Varnish recreate cron"
    description: "If empty, Varnish will not be force recreated on a cron schedule"
    type: "string"
    default: ""
    group: "Varnish configuration"

  - variable: "volto.resources.requests.memory"
    label: "Volto memory request"
    type: "string"
    required: true
    default: "2Gi"
    group: "Memory"

  - variable: "volto.resources.limits.memory"
    label: "Volto memory limit"
    description: "Must be greater than or equal to request"
    type: "string"
    required: true
    default: "2Gi"
    group: "Memory"

  - variable: "varnish.resources.requests.memory"
    label: "Varnish memory request"
    type: "string"
    required: true
    default: "2Gi"
    group: "Memory"

  - variable: "varnish.resources.limits.memory"
    label: "Varnish memory limit"
    description: "Must be greater than or equal to request"
    type: "string"
    required: true
    default: "3Gi"
    group: "Memory"
