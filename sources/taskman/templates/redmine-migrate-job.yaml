{{- $migrate := .Values.redmineMigrate | default dict }}
{{- $migrateEnv := $migrate.environment | default dict }}
{{- $migrateHistorySlots := 3 }}
{{- $migrateSlot := mod .Release.Revision $migrateHistorySlots }}
{{- $filesClaim := .Values.storage.filesDir.existingClaim | default (printf "redmine-files-%s-redmine-ss-0" .Release.Name) }}
{{- $tmpClaim := .Values.storage.tmpDir.existingClaim | default (printf "redmine-tmp-%s-redmine-ss-0" .Release.Name) }}
{{- $githubClaim := .Values.storage.github.existingClaim | default (printf "github-%s-redmine-ss-0" .Release.Name) }}
{{- $pluginsClaim := .Values.storage.plugins.existingClaim | default (printf "plugins-%s-redmine-ss-0" .Release.Name) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-redmine-migrate-job-{{ $migrateSlot }}
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: redmine-migrate
    migrate-history-slot: {{ $migrateSlot | quote }}
    migrate-release-revision: {{ .Release.Revision | quote }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ $migrate.backoffLimit | default 1 }}
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        component: redmine-migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      initContainers:
      - name: {{ .Release.Name }}-plugins-init
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/bin/bash", "-lc"]
        args:
        - |
          set -euo pipefail
          mkdir -p /work/plugins
          cp -a /usr/src/redmine/plugins/. /work/plugins/
          if [ -d /addons/current/plugins ]; then
            for source in /addons/current/plugins/*; do
              [ -d "${source}" ] || continue
              name="$(basename "${source}")"
              if [ -f "${source}/init.rb" ]; then
                rm -rf "/work/plugins/${name}"
                cp -a "${source}" "/work/plugins/${name}"
              else
                echo "Skipping mounted plugin override for ${name}: init.rb not found"
              fi
            done
          fi
        volumeMounts:
        - name: plugins
          mountPath: /addons
        - name: plugins-workdir
          mountPath: /work/plugins
      containers:
      - name: {{ .Release.Name }}-redmine-migrate
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: TZ
          value: "{{ .Values.timezone }}"
        - name: REDMINE_DB_DATABASE
          value: "{{ .Values.mysql.environment.MYSQL_DATABASE }}"
        - name: REDMINE_DB_USERNAME
          value: "{{ .Values.mysql.environment.MYSQL_USER }}"
        - name: REDMINE_DB_PASSWORD
          value: "{{ .Values.mysql.environment.MYSQL_PASSWORD }}"
        - name: START_SERVER
          value: "0"
        - name: START_CRON
          value: "0"
        - name: START_SOLID_QUEUE
          value: "0"
        - name: MIGRATIONS_ONLY_STARTUP
          value: "1"
        - name: RUN_DB_MIGRATE
          value: {{ $migrate.runDbMigrate | default "1" | quote }}
        - name: REDMINE_PLUGINS_MIGRATE
          value: {{ $migrate.pluginsMigrate | default "no" | quote }}
        - name: ASSETS_PRECOMPILE
          value: {{ $migrate.assetsPrecompile | default "1" | quote }}
        - name: ASSETS_PRECOMPILE_FORCE
          value: {{ $migrate.assetsPrecompileForce | default "0" | quote }}
        - name: ADMIN_BOOTSTRAP_ENABLE
          value: {{ $migrate.adminBootstrapEnable | default "0" | quote }}
        {{- range $key, $value := .Values.redmine.environment }}
        {{- if and (ne $key "START_SERVER") (ne $key "START_CRON") (ne $key "START_SOLID_QUEUE") (ne $key "RUN_DB_MIGRATE") (ne $key "MIGRATIONS_ONLY_STARTUP") (ne $key "REDMINE_PLUGINS_MIGRATE") (ne $key "ASSETS_PRECOMPILE") (ne $key "ASSETS_PRECOMPILE_FORCE") (ne $key "ADMIN_BOOTSTRAP_ENABLE") (not (hasKey $migrateEnv $key)) (ne $value nil) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        {{- range $key, $value := $migrateEnv }}
        {{- if ne $value nil }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        volumeMounts:
        - name: redmine-files
          mountPath: /usr/src/redmine/files
        - name: redmine-tmp
          mountPath: /usr/src/redmine/tmp
        - name: redmine-tmp
          mountPath: /usr/src/redmine/public/assets
          subPath: assets
        - name: github
          mountPath: /var/local/redmine/github/
        - name: plugins
          mountPath: /addons
        - name: plugins-workdir
          mountPath: /usr/src/redmine/plugins
        resources:
          {{- toYaml ($migrate.resources | default dict) | nindent 10 }}
      volumes:
      - name: redmine-files
        persistentVolumeClaim:
          claimName: {{ $filesClaim }}
      - name: redmine-tmp
        persistentVolumeClaim:
          claimName: {{ $tmpClaim }}
      - name: github
        persistentVolumeClaim:
          claimName: {{ $githubClaim }}
      - name: plugins
        persistentVolumeClaim:
          claimName: {{ $pluginsClaim }}
      - name: plugins-workdir
        emptyDir: {}
