{{- if and .Values.ingress.enabled .Values.ingress.restrictedRoutes.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-private-routes-ingress
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: nginx
  annotations:
  {{- if .Values.ingress.letsencrypt }}
    cert-manager.io/cluster-issuer: "{{ .Values.ingress.letsencrypt }}"
  {{- end }}
  {{- range $key, $value := .Values.ingress.configuration }}
    {{- if ($value) }}
    nginx.ingress.kubernetes.io/{{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
    nginx.ingress.kubernetes.io/whitelist-source-range: {{ .Values.ingress.restrictedRoutes.whitelistSourceRange | quote }}
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}

spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.redmine.hostname }}
    http:
      paths:
      - path: /rails_pulse
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-nginx
            port:
              number: 80
      - path: /jobs
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-nginx
            port:
              number: 80
  {{- if .Values.ingress.tls }}
  tls:
  - hosts:
    - {{ .Values.redmine.hostname }}
    {{- if .Values.ingress.certificate }}
    secretName: {{ .Values.ingress.certificate }}
    {{- end  }}
  {{- end  }}
{{- end }}
