{{- if and .Values.solidQueue.enabled .Values.solidQueue.scheduler.enabled }}
{{- $recurringConfig := .Values.solidQueue.scheduler.recurring.config | default (.Files.Get "files/recurring.yml") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-redmine-recurring-cm
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: redmine-recurring
data:
  recurring.yml: |
{{- $recurringConfig | nindent 4 }}
{{- end }}
