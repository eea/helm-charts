apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redmine-dpl
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: redmine
spec:
  {{- $mainStartServer := .Values.redmine.environment.START_SERVER | default "1" }}
  {{- $mainStartCron := .Values.redmine.environment.START_CRON | default "0" }}
  {{- $mainStartSolidQueue := .Values.redmine.environment.START_SOLID_QUEUE | default "0" }}
  {{- $filesClaim := .Values.storage.filesDir.existingClaim | default (printf "redmine-files-%s-redmine-ss-0" .Release.Name) }}
  {{- $tmpClaim := .Values.storage.tmpDir.existingClaim | default (printf "redmine-tmp-%s-redmine-ss-0" .Release.Name) }}
  {{- $githubClaim := .Values.storage.github.existingClaim | default (printf "github-%s-redmine-ss-0" .Release.Name) }}
  {{- $pluginsClaim := .Values.storage.plugins.existingClaim | default (printf "plugins-%s-redmine-ss-0" .Release.Name) }}
  replicas: {{ .Values.redmine.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      component: redmine
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        component: redmine
    spec:
      terminationGracePeriodSeconds: 10
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      initContainers:
      - name: {{ .Release.Name }}-plugins-init
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/bin/bash", "-lc"]
        args:
        - |
          set -euo pipefail
          mkdir -p /work/plugins
          cp -a /usr/src/redmine/plugins/. /work/plugins/
          if [ -d /addons/current/plugins ]; then
            for source in /addons/current/plugins/*; do
              [ -d "${source}" ] || continue
              name="$(basename "${source}")"
              if [ -f "${source}/init.rb" ]; then
                rm -rf "/work/plugins/${name}"
                cp -a "${source}" "/work/plugins/${name}"
              else
                echo "Skipping mounted plugin override for ${name}: init.rb not found"
              fi
            done
          fi
        volumeMounts:
        - name: plugins
          mountPath: /addons
        - name: plugins-workdir
          mountPath: /work/plugins
      containers:
      - name: {{ .Release.Name }}-redmine
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 3000
          protocol: TCP
        env:
        - name: TZ
          value: "{{ .Values.timezone }}"
        - name: REDMINE_DB_DATABASE
          value: "{{ .Values.mysql.environment.MYSQL_DATABASE }}"
        - name: REDMINE_DB_USERNAME
          value: "{{ .Values.mysql.environment.MYSQL_USER }}"
        - name: REDMINE_DB_PASSWORD
          value: "{{ .Values.mysql.environment.MYSQL_PASSWORD }}"
        - name: START_SERVER
          value: {{ $mainStartServer | quote }}
        - name: START_CRON
          value: {{ $mainStartCron | quote }}
        - name: START_SOLID_QUEUE
          value: {{ $mainStartSolidQueue | quote }}
        - name: RUN_DB_MIGRATE
          value: "0"
        - name: REDMINE_PLUGINS_MIGRATE
          value: "no"
        - name: MIGRATIONS_ONLY_STARTUP
          value: "0"
        {{- range $key, $value := .Values.redmine.environment }}
        {{- if and (ne $key "START_SERVER") (ne $key "START_CRON") (ne $key "START_SOLID_QUEUE") (ne $key "RUN_DB_MIGRATE") (ne $key "REDMINE_PLUGINS_MIGRATE") (ne $key "MIGRATIONS_ONLY_STARTUP") (ne $value nil) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        volumeMounts:
        - name: redmine-files
          mountPath: /usr/src/redmine/files
        - name: redmine-tmp
          mountPath: /usr/src/redmine/tmp
        - name: redmine-tmp
          mountPath: /usr/src/redmine/public/assets
          subPath: assets
        - name: github
          mountPath: /var/local/redmine/github/
        - name: plugins
          mountPath: /addons
        - name: plugins-workdir
          mountPath: /usr/src/redmine/plugins

        resources:
          {{- toYaml .Values.redmine.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.redmine.securityContext | nindent 12 }}

        {{- if (.Values.redmine.livenessProbe) }}
        livenessProbe:
          {{- toYaml .Values.redmine.livenessProbe | nindent 10 }}
        {{- end }}

        {{- if (.Values.redmine.startupProbe) }}
        {{- $startupProbe := deepCopy .Values.redmine.startupProbe }}
        {{- if and (hasKey $startupProbe "tcpSocket") (hasKey $startupProbe "httpGet") }}
        {{- $_ := unset $startupProbe "httpGet" }}
        {{- end }}
        startupProbe:
          {{- toYaml $startupProbe | nindent 10 }}
        {{- end }}

        {{- if (.Values.redmine.readinessProbe) }}
        {{- $readinessProbe := deepCopy .Values.redmine.readinessProbe }}
        {{- if and (hasKey $readinessProbe "tcpSocket") (hasKey $readinessProbe "httpGet") }}
        {{- $_ := unset $readinessProbe "httpGet" }}
        {{- end }}
        readinessProbe:
          {{- toYaml $readinessProbe | nindent 10 }}
        {{- end }}
      {{- with .Values.redmine.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redmine.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redmine.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redmine.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: redmine-files
        persistentVolumeClaim:
          claimName: {{ $filesClaim }}
      - name: redmine-tmp
        persistentVolumeClaim:
          claimName: {{ $tmpClaim }}
      - name: github
        persistentVolumeClaim:
          claimName: {{ $githubClaim }}
      - name: plugins
        persistentVolumeClaim:
          claimName: {{ $pluginsClaim }}
      - name: plugins-workdir
        emptyDir: {}
      restartPolicy: Always
