{{- $recurring := .Values.redmineJobs.recurring | default dict }}
{{- $recurringEnabled := $recurring.enabled | default true }}
{{- if and (hasKey .Values "redmineJobs") (.Values.redmineJobs.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redmine-jobs-dpl
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: redmine-jobs
spec:
  replicas: {{ .Values.redmineJobs.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      component: redmine-jobs
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        component: redmine-jobs
    spec:
      terminationGracePeriodSeconds: 30
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      containers:
      - name: {{ .Release.Name }}-redmine-jobs
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/bin/bash", "-lc"]
        args:
        - |
          cp /opt/recurring/recurring.yml /usr/src/redmine/config/recurring.yml
          exec /start_redmine.sh
        env:
        - name: TZ
          value: "{{ .Values.timezone }}"
        - name: REDMINE_DB_DATABASE
          value: "{{ .Values.mysql.environment.MYSQL_DATABASE }}"
        - name: REDMINE_DB_USERNAME
          value: "{{ .Values.mysql.environment.MYSQL_USER }}"
        - name: REDMINE_DB_PASSWORD
          value: "{{ .Values.mysql.environment.MYSQL_PASSWORD }}"
        - name: START_SERVER
          value: "0"
        - name: START_CRON
          value: "0"
        - name: START_SOLID_QUEUE
          value: "1"
        {{- range $key, $value := .Values.redmine.environment }}
        {{- if and (ne $key "REDIS_URL") (ne $key "START_SERVER") (ne $key "START_CRON") (ne $key "START_SOLID_QUEUE") (ne $key "CRON_IN_ASYNC_JOBS_ONLY") (ne $key "MIGRATIONS_ONLY_STARTUP") (ne $key "REDMINE_PLUGINS_MIGRATE") (ne $key "ADMIN_BOOTSTRAP_ENABLE") (not (hasKey $.Values.redmineJobs.environment $key)) (ne $value nil) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        {{- range $key, $value := .Values.redmineJobs.environment }}
        {{- if and (ne $key "START_SERVER") (ne $key "START_CRON") (ne $key "START_SOLID_QUEUE") (ne $value nil) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        volumeMounts:
        - name: redmine-files
          mountPath: /usr/src/redmine/files
        - name: redmine-tmp
          mountPath: /usr/src/redmine/tmp
        - name: redmine-tmp
          mountPath: /usr/src/redmine/public/assets
          subPath: assets
        - name: github
          mountPath: /var/local/redmine/github/
        - name: plugins
          mountPath: /addons
        - name: recurring-config
          mountPath: /opt/recurring/recurring.yml
          subPath: recurring.yml
          readOnly: true
        resources:
          {{- toYaml .Values.redmineJobs.resources | nindent 10 }}
      volumes:
      - name: redmine-files
        persistentVolumeClaim:
          claimName: redmine-files-{{ .Release.Name }}-redmine-ss-0
      - name: redmine-tmp
        persistentVolumeClaim:
          claimName: redmine-tmp-{{ .Release.Name }}-redmine-ss-0
      - name: github
        persistentVolumeClaim:
          claimName: github-{{ .Release.Name }}-redmine-ss-0
      - name: plugins
        persistentVolumeClaim:
          claimName: plugins-{{ .Release.Name }}-redmine-ss-0
      - name: recurring-config
        configMap:
          name: {{ .Release.Name }}-redmine-recurring-cm
      {{- with .Values.redmineJobs.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redmineJobs.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redmineJobs.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
