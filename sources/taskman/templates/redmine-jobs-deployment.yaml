{{- $recurring := .Values.redmineJobs.recurring | default dict }}
{{- $recurringEnabled := $recurring.enabled | default true }}
{{- $filesClaim := .Values.storage.filesDir.existingClaim | default (printf "redmine-files-%s-redmine-ss-0" .Release.Name) }}
{{- $tmpClaim := .Values.storage.tmpDir.existingClaim | default (printf "redmine-tmp-%s-redmine-ss-0" .Release.Name) }}
{{- $githubClaim := .Values.storage.github.existingClaim | default (printf "github-%s-redmine-ss-0" .Release.Name) }}
{{- $pluginsClaim := .Values.storage.plugins.existingClaim | default (printf "plugins-%s-redmine-ss-0" .Release.Name) }}
{{- if and (hasKey .Values "redmineJobs") (.Values.redmineJobs.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redmine-jobs-dpl
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: redmine-jobs
spec:
  replicas: {{ .Values.redmineJobs.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "appl.selectorLabels" . | nindent 6 }}
      component: redmine-jobs
  template:
    metadata:
      labels:
        {{- include "appl.selectorLabels" . | nindent 8 }}
        component: redmine-jobs
    spec:
      terminationGracePeriodSeconds: 30
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "appl.serviceAccountName" . }}
      initContainers:
      - name: {{ .Release.Name }}-plugins-init
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/bin/bash", "-lc"]
        args:
        - |
          set -euo pipefail
          mkdir -p /work/plugins
          cp -a /usr/src/redmine/plugins/. /work/plugins/
          if [ -d /addons/current/plugins ]; then
            for source in /addons/current/plugins/*; do
              [ -d "${source}" ] || continue
              name="$(basename "${source}")"
              if [ -f "${source}/init.rb" ]; then
                rm -rf "/work/plugins/${name}"
                cp -a "${source}" "/work/plugins/${name}"
              else
                echo "Skipping mounted plugin override for ${name}: init.rb not found"
              fi
            done
          fi
        volumeMounts:
        - name: plugins
          mountPath: /addons
        - name: plugins-workdir
          mountPath: /work/plugins
      containers:
      - name: {{ .Release.Name }}-redmine-jobs
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/bin/bash", "-lc"]
        args:
        - |
          cp /opt/recurring/recurring.yml /usr/src/redmine/config/recurring.yml
          exec /start_redmine.sh
        env:
        - name: TZ
          value: "{{ .Values.timezone }}"
        - name: REDMINE_DB_DATABASE
          value: "{{ .Values.mysql.environment.MYSQL_DATABASE }}"
        - name: REDMINE_DB_USERNAME
          value: "{{ .Values.mysql.environment.MYSQL_USER }}"
        - name: REDMINE_DB_PASSWORD
          value: "{{ .Values.mysql.environment.MYSQL_PASSWORD }}"
        - name: START_SERVER
          value: "0"
        - name: START_CRON
          value: "0"
        - name: START_SOLID_QUEUE
          value: "1"
        - name: RUNTIME_BUNDLE_INSTALL
          value: "1"
        - name: RUNTIME_BUNDLE_LOCAL_INSTALL
          value: "1"
        - name: RUN_DB_MIGRATE
          value: "0"
        - name: REDMINE_PLUGINS_MIGRATE
          value: "no"
        - name: MIGRATIONS_ONLY_STARTUP
          value: "0"
        {{- range $key, $value := .Values.redmine.environment }}
        {{- if and (ne $key "REDIS_URL") (ne $key "START_SERVER") (ne $key "START_CRON") (ne $key "START_SOLID_QUEUE") (ne $key "RUNTIME_BUNDLE_INSTALL") (ne $key "RUNTIME_BUNDLE_LOCAL_INSTALL") (ne $key "RUN_DB_MIGRATE") (ne $key "CRON_IN_ASYNC_JOBS_ONLY") (ne $key "MIGRATIONS_ONLY_STARTUP") (ne $key "REDMINE_PLUGINS_MIGRATE") (ne $key "ADMIN_BOOTSTRAP_ENABLE") (not (hasKey $.Values.redmineJobs.environment $key)) (ne $value nil) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        {{- range $key, $value := .Values.redmineJobs.environment }}
        {{- if and (ne $key "START_SERVER") (ne $key "START_CRON") (ne $key "START_SOLID_QUEUE") (ne $key "RUNTIME_BUNDLE_INSTALL") (ne $key "RUNTIME_BUNDLE_LOCAL_INSTALL") (ne $key "RUN_DB_MIGRATE") (ne $key "REDMINE_PLUGINS_MIGRATE") (ne $key "MIGRATIONS_ONLY_STARTUP") (ne $value nil) }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        volumeMounts:
        - name: redmine-files
          mountPath: /usr/src/redmine/files
        - name: redmine-tmp
          mountPath: /usr/src/redmine/tmp
        - name: redmine-tmp
          mountPath: /usr/src/redmine/public/assets
          subPath: assets
        - name: github
          mountPath: /var/local/redmine/github/
        - name: plugins
          mountPath: /addons
        - name: plugins-workdir
          mountPath: /usr/src/redmine/plugins
        - name: recurring-config
          mountPath: /opt/recurring/recurring.yml
          subPath: recurring.yml
          readOnly: true
        resources:
          {{- toYaml .Values.redmineJobs.resources | nindent 10 }}
      volumes:
      - name: redmine-files
        persistentVolumeClaim:
          claimName: {{ $filesClaim }}
      - name: redmine-tmp
        persistentVolumeClaim:
          claimName: {{ $tmpClaim }}
      - name: github
        persistentVolumeClaim:
          claimName: {{ $githubClaim }}
      - name: plugins
        persistentVolumeClaim:
          claimName: {{ $pluginsClaim }}
      - name: plugins-workdir
        emptyDir: {}
      - name: recurring-config
        configMap:
          name: {{ .Release.Name }}-redmine-recurring-cm
      {{- with .Values.redmineJobs.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redmineJobs.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redmineJobs.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redmineJobs.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
