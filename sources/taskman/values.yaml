

image:
  repository: eeacms/redmine
  pullPolicy: Always
  tag: "redmine6"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

timezone: Europe/Copenhagen


ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  letsencrypt: "01dev-eea-letsencrypt"
  configuration:
    proxy-body-size: "256m"
    proxy-read-timeout: "180s"
    proxy-send-timeout: "120s"
  tls: true
  certificate: "taskman-test-01dev-tls"
  restrictedRoutes:
    enabled: true
    whitelistSourceRange: "192.168.60.0/22,192.168.64.0/21,10.92.24.0/21,10.50.0.0/16,87.54.7.0/24,10.20.30.0/24,10.0.9.0/24,10.42.0.0/16"
  widget:
    enabled: false
    configuration:
      limit-rph: 4



storage:
  filesDir:
    storageClassName: "nfs-client"
    size: 200Gi
    existingClaim: ""
  tmpDir:
    storageClassName: "nfs-client"
    size: 10Gi
    existingClaim: ""
  github:
    storageClassName: "nfs-client"
    size: 1Gi
    existingClaim: ""
  plugins:
    storageClassName: "nfs-client"
    size: 1Gi
    existingClaim: ""
  assets:
    storageClassName: "nfs-client"
    size: 2Gi


redmine:
