# Local docker-desktop k8s testing config
# Uses nfs-client storage class (mapped to local-path)

image:
  repository: eeacms/redmine
  pullPolicy: IfNotPresent
  tag: "redmine6"

ingress:
  enabled: false

storage:
  filesDir:
    storageClassName: "nfs-client"
    size: 5Gi
  tmpDir:
    storageClassName: "nfs-client"
    size: 2Gi
  github:
    storageClassName: "nfs-client"
    size: 1Gi
  plugins:
    storageClassName: "nfs-client"
    size: 1Gi
  assets:
    storageClassName: "nfs-client"
    size: 1Gi

redmine:
  replicas: 1
  serviceType: ClusterIP
  hostname: localhost
  resources:
    limits:
      memory: 1Gi
    requests:
      memory: 512Mi
  environment:
    START_SERVER: "1"
    START_CRON: "0"
    START_SOLID_QUEUE: "0"
    RUN_DB_MIGRATE: "0"
    FAST_BOOT: "1"
    REQUIRE_MOUNTED_ADDONS: "1"
    MOUNTED_ADDONS_ROOT: "/addons/current"
    RUNTIME_PLUGIN_SYNC: "1"
    RUNTIME_THEME_SYNC: "1"
    PLUGINS_URL: "https://cmshare.eea.europa.eu/remote.php/dav/files/redmine_plugin_installer/redmine6-files/plugins"
    ADDONS_BASE_URL: "https://cmshare.eea.europa.eu/remote.php/dav/files/redmine_plugin_installer/redmine6-files"
    PLUGINS_USER: "redmine_plugin_installer"
    PLUGINS_PASSWORD: "0RevV7hW5Sbq"
    RUNTIME_BUNDLE_INSTALL: "1"
    RUNTIME_BUNDLE_LOCAL_INSTALL: "1"
    ASSETS_PRECOMPILE: "0"
    ASSETS_PRECOMPILE_FORCE: "0"
    REDMINE_DB_MYSQL: mysql
    REDMINE_DB_POOL: "3"
    WEB_CONCURRENCY: "1"
    RAILS_MAX_THREADS: "2"
    REDMINE_HOST: redmine:3000
    SECRET_KEY_BASE: "localdevsecret123456789012345678901234567890"
    RAILS_PULSE_ENABLED: "0"
    TASKMAN_PATCH_TIME_ENTRY_CUSTOM_VALUES: "1"
    TASKMAN_PATCH_PROJECT_MEMBERS_PRELOAD: "1"
    TASKMAN_PATCH_USER_ROLES_PRELOAD: "1"
    TASKMAN_PATCH_ACTIVITY_AUTHOR_PRELOAD: "1"
  livenessProbe:
    httpGet:
      path: /up
      port: 3000
    periodSeconds: 30
    timeoutSeconds: 15
    initialDelaySeconds: 0
    failureThreshold: 10
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: /up
      port: 3000
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1
  startupProbe:
    tcpSocket:
      port: 3000
    periodSeconds: 10
    timeoutSeconds: 5
    initialDelaySeconds: 60
    failureThreshold: 30
    successThreshold: 1

redmineMigrate:
  enabled: true
  backoffLimit: 1
  pluginsMigrate: "auto"
  assetsPrecompile: "0"
  assetsPrecompileForce: "0"
  environment:
    RUNTIME_BUNDLE_INSTALL: "0"
    RUNTIME_BUNDLE_LOCAL_INSTALL: "0"
  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 512Mi

# Disabled services
redmineJobs:
  enabled: false

drawio:
  enabled: false

postfix:
  enabled: true
  image:
    repository: eaudeweb/mailtrap
    tag: latest
    pullPolicy: IfNotPresent
  mailtrap:
    httpenabled: true
    serviceType: ClusterIP
    ingress:
      enabled: false

memcached:
  enabled: false

mysqlbackup:
  enabled: false

httpd:
  enabled: false

networkPolicy:
  enabled: false

mysql:
  image:
    repository: mysql
    tag: "8.4.8"
  pullPolicy: IfNotPresent
  environment:
    MYSQL_DATABASE: redmine
    MYSQL_USER: redmine
    MYSQL_PASSWORD: redmine
    MYSQL_ROOT_PASSWORD: password
  args:
    - '--innodb-buffer-pool-size=512M'
    - '--innodb-log-buffer-size=8M'
    - '--max-connections=50'
    - '--character-set-server=utf8mb4'
    - '--collation-server=utf8mb4_unicode_ci'
  datastorage:
    size: 10Gi
    storageClassName: "nfs-client"
  resources:
    requests:
      memory: 512Mi
    limits:
      memory: 1Gi
  livenessProbe:
    tcpSocket:
      port: 3306
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  startupProbe:
    tcpSocket:
      port: 3306
    failureThreshold: 60
    periodSeconds: 5
    initialDelaySeconds: 10
    timeoutSeconds: 5

addonsSync:
  enabled: true
  syncMode: additive
