production:
  github_repo_sync:
    command: "system('/var/local/redmine/crons/redmine_github_sync.sh') || raise('github_repo_sync failed')"
    schedule: 15 6 * * *
  taskman_mail:
    command: >-
      conn = ActiveRecord::Base.connection;
      acquired = conn.execute("SELECT GET_LOCK('taskman_mail', 0)").first.first == 1;
      next unless acquired;
      begin;
        ENV['host']=ENV['T_EMAIL_HOST'];
        ENV['username']=ENV['T_EMAIL_USER'];
        ENV['password']=ENV['T_EMAIL_PASS'];
        ENV['ssl']=ENV.fetch('T_EMAIL_SSL','false');
        ENV['port']=ENV['T_EMAIL_PORT'].to_s;
        ENV['folder']=ENV.fetch('T_EMAIL_FOLDER','INBOX');
        ENV['project']='it-helpdesk';
        ENV['move_on_success']='read';
        ENV['move_on_failure']='failed';
        ENV['allow_override']='project,tracker,priority,status,category,fixed_version';
        Rake::Task['redmine:email:receive_imap'].reenable;
        Rake::Task['redmine:email:receive_imap'].invoke;
      ensure;
        conn.execute("SELECT RELEASE_LOCK('taskman_mail')");
      end
    schedule: "2/5 * * * *"
  helpdesk_fetch_mail:
    command: >-
      conn = ActiveRecord::Base.connection;
      acquired = conn.execute("SELECT GET_LOCK('helpdesk_fetch_mail', 0)").first.first == 1;
      next unless acquired;
      begin;
        Rake::Task['redmine:email:helpdesk:receive'].reenable;
        Rake::Task['redmine:email:helpdesk:receive'].invoke;
      ensure;
        conn.execute("SELECT RELEASE_LOCK('helpdesk_fetch_mail')");
      end
    schedule: "*/5 * * * *"
  entra_users_sync:
    command: "system('bundle exec rake -f /usr/src/redmine/Rakefile entra_id:sync:users RAILS_ENV=production') || raise('entra_users_sync failed')"
    schedule: 0 * * * *
  entra_groups_sync:
    command: "system('bundle exec rake -f /usr/src/redmine/Rakefile entra_id:sync:groups RAILS_ENV=production') || raise('entra_groups_sync failed')"
    schedule: 15 4 * * *