questions:

  - variable: "redmine.hostname"
    label: "Url"
    description: "DNS name for this deployment"
    default: "taskman.eea.europa.eu"
    type: "string"
    required: true

  - variable: "ingress.tls"
    label: "Enable https"
    default: true
    type: "boolean"
    required: true

  - variable: "ingress.letsencrypt"
    label: "Ingress letsencrypt cluster-issuer"
    description: "Leave empty when not using letsencrypt"
    default: "01dev-eea-letsencrypt"
    show_if: "ingress.tls"
  - variable: "ingress.configuration.proxy-body-size"
    label: "Rancher LB body size"
    description: "Example 100m"
    type: "string"
    default: "100m"

  - variable: "ingress.configuration.proxy-read-timeout"
    label: "Rancher LB read timeout"
    description: "Maximum response time from upstream server, in seconds, example 60s"
    type: "string"
    default: "120s"

  - variable: "ingress.configuration.proxy-send-timeout"
    label: "Rancher LB send timeout"
    description: "Timeout before closing the connection"
    type: "string"
    default: "60s"

  - variable: "ingress.certificate"
    label: "Certificate name"
    description: "Leave blank for default certificate"
    default: "taskman.eea.europa.eu-tls"
    type: "string"
    show_if: "ingress.tls"
  - variable: "ingress.restrictedRoutes.enabled"
    label: "Enable private ingresses for /rails_pulse and /jobs"
    description: "Creates dedicated ingresses for /rails_pulse and /jobs with source IP whitelist."
    default: true
    type: "boolean"
    required: true
  - variable: "ingress.restrictedRoutes.whitelistSourceRange"
    label: "Private routes whitelist source ranges"
    description: "Comma-separated CIDRs allowed to access /rails_pulse and /jobs."
    default: "192.168.60.0/22,192.168.64.0/21,10.92.24.0/21,10.50.0.0/16,87.54.7.0/24,10.20.30.0/24,10.0.9.0/24,10.42.0.0/16"
    type: "string"
    required: true
    show_if: "ingress.restrictedRoutes.enabled"


  - variable: "httpd.ratelimiting.enabled"
    label: "Enable ratelimiting on unauthenticated users"
    default: false
    type: "boolean"
    required: true
  - variable: "httpd.ratelimiting.period"
    label: "Rate limiting period"
    default: "10m"
    type: "string"
    show_if: "httpd.ratelimiting.enabled"
  - variable: "httpd.ratelimiting.rate"
    label: "Rate limiting rate"
    default: "10r/m"
    type: "string"
    show_if: "httpd.ratelimiting.enabled"
  - variable: "httpd.ratelimiting.burst"
    label: "Rate limiting burst"
    default: "5"
    type: "string"
    show_if: "httpd.ratelimiting.enabled"



  - variable: "redmine.environment.RESTART_CRON"
    label: "Taskman restart crontab schedule(UTC):"
    description: "Stops redmine process and container, to be restarted by rancher. Linux crontab format - for example, `0 2 * * *` is daily at 02:00 UTC. If empty, will not run."
    type: "string"
    group: "Redmine configuration"
  - variable: "redmine.replicas"
    label: "Redmine web replicas"
    description: "Number of Redmine web pods. For values > 1, use shared existing claims and a fixed SECRET_KEY_BASE."
    type: "int"
    default: 1
    required: true
    group: "Runtime and scaling"
  - variable: "httpd.replicas"
    label: "Nginx proxy replicas"
    description: "Number of nginx pods in front of Redmine. Increase for higher edge throughput."
    type: "int"
    default: 1
    required: true
    group: "Runtime and scaling"
  - variable: "redmine.environment.WEB_CONCURRENCY"
    label: "Puma workers per Redmine pod"
    description: "Start with 2. Increase carefully with CPU and DB capacity."
    type: "int"
    default: 2
    required: true
    group: "Runtime and scaling"
  - variable: "redmine.environment.RAILS_MAX_THREADS"
    label: "Puma threads per worker"
    description: "Start with 5. Tune with REDMINE_DB_POOL."
    type: "int"
    default: 5
    required: true
    group: "Runtime and scaling"
  - variable: "redmine.environment.REDMINE_DB_POOL"
    label: "Redmine DB pool"
    description: "Should be at least WEB_CONCURRENCY x RAILS_MAX_THREADS per web pod, plus jobs headroom."
    type: "int"
    default: 20
    required: true
    group: "Runtime and scaling"
  - variable: "storage.filesDir.existingClaim"
    label: "Shared files PVC claim"
    description: "Required for safe horizontal scaling. Use an RWX claim."
    type: "string"
    default: ""
    group: "Runtime and scaling"
  - variable: "storage.tmpDir.existingClaim"
    label: "Shared tmp/assets PVC claim"
    description: "Optional but recommended for multi-pod consistency. Use an RWX claim."
    type: "string"
    default: ""
    group: "Runtime and scaling"
  - variable: "storage.github.existingClaim"
    label: "Shared github cache PVC claim"
    description: "Optional shared claim for github sync cache."
    type: "string"
    default: ""
    group: "Runtime and scaling"
  - variable: "storage.plugins.existingClaim"
    label: "Shared plugins PVC claim"
    description: "Shared claim used by Redmine and addons sync job."
    type: "string"
    default: ""
    group: "Runtime and scaling"
  - variable: "redmineJobs.enabled"
    label: "Enable async jobs pod"
    description: "Runs Solid Queue workers and recurring jobs in dedicated pod(s)."
    type: "boolean"
    default: true
    required: true
    group: "Runtime and scaling"
  - variable: "redmineJobs.replicas"
    label: "Async jobs pod replicas"
    description: "Number of Redmine jobs pods."
    type: "int"
    default: 1
    required: true
    group: "Runtime and scaling"
  - variable: "redmineJobs.resources.requests.memory"
    label: "Jobs memory request"
    description: "Memory requested by the async jobs pod."
    type: "string"
    default: "384Mi"
    required: true
    group: "Runtime and scaling"
  - variable: "redmineJobs.resources.limits.memory"
    label: "Jobs memory limit"
    description: "Hard memory limit for the async jobs pod."
    type: "string"
    default: "768Mi"
    required: true
    group: "Runtime and scaling"
  - variable: "redmineJobs.environment.RAILS_MAX_THREADS"
    label: "Jobs max threads"
    description: "Rails thread count used by async jobs container."
    type: "int"
    default: 2
    required: true
    group: "Runtime and scaling"
  - variable: "redmineJobs.environment.REDMINE_DB_POOL"
    label: "Jobs DB pool"
    description: "Database pool for async jobs pod."
    type: "int"
    default: 5
    required: true
    group: "Runtime and scaling"
  - variable: "redmineJobs.environment.MALLOC_ARENA_MAX"
    label: "Jobs malloc arenas"
    description: "Lower values reduce allocator memory overhead."
    type: "int"
    default: 2
    required: true
    group: "Runtime and scaling"
  - variable: "redmineJobs.recurring.enabled"
    label: "Enable recurring jobs schedule"
    description: "Enable/disable loading recurring.yml for periodic jobs."
    type: "boolean"
    default: true
    required: true
    group: "Runtime and scaling"
  - variable: "addonsSync.enabled"
    label: "Enable addons sync job"
    description: "Sync plugins/themes from remote share into mounted addon volumes."
    type: "boolean"
    default: true
    required: true
    group: "Runtime and scaling"
  - variable: "addonsSync.source"
    label: "Addons sync source type"
    description: "share downloads from remote source, dir uses mounted directory."
    type: "enum"
    default: "share"
    options:
      - "share"
      - "dir"
    required: true
    group: "Runtime and scaling"
  - variable: "addonsSync.skipIfPresent"
    label: "Skip addons sync if present"
    description: "Set 1 to skip sync when addons already exist."
    type: "enum"
    default: "0"
    options:
      - "0"
      - "1"
    required: true
    group: "Runtime and scaling"
  - variable: "redmineMigrate.enabled"
    label: "Enable migrate job"
    description: "Run dedicated migration job during install/upgrade."
    type: "boolean"
    default: true
    required: true
    group: "Runtime and scaling"
  - variable: "redmineMigrate.runDbMigrate"
    label: "Run DB migrations in migrate job"
    description: "Controls db:migrate execution in migrate job."
    type: "enum"
    default: "1"
    options:
      - "0"
      - "1"
    required: true
    group: "Runtime and scaling"
  - variable: "redmineMigrate.pluginsMigrate"
    label: "Run plugin migrations in migrate job"
    description: "Plugin migration mode for migrate job."
    type: "enum"
    default: "auto"
    options:
      - "no"
      - "auto"
      - "yes"
    required: true
    group: "Runtime and scaling"
  - variable: "redmine.environment.REDMINE_SMTP_DOMAIN"
    label: "Taskman default Outgoing SMTP domain"
    description: "Used in default outgoing mail settings, postfix"
    default: "eionet.europa.eu"
    type: "string"
    group: "Redmine configuration"
  - variable: "redmine.environment.REDMINE_SMTP_TLS"
    label: "Taskman default Outgoing SMTP TLS enabled"
    description: "Used in default outgoing mail settings, postfix"
    default: "true"
    type: "enum"
    options:
      - "true"
      - "false"  
    group: "Redmine configuration"
  - variable: "redmine.environment.REDMINE_SMTP_STARTTLSAUTO"
    label: "Taskman default Outgoing SMTP SSL enabled"
    description: "Used in default mail settings, postfix"
    default: "true"
    type: "enum"
    options:
      - "true"
      - "false"      
    group: "Redmine configuration"
  - variable: "redmine.environment.INCOMING_MAIL_API_KEY"
    label: "Incoming mail API key"
    description: " incoming emails API: Administration -> Settings -> Incoming email - API key"
    type: "string"
    group: "Redmine configuration"
  - variable: "redmine.environment.T_EMAIL_HOST"
    label: "Taskman email host"
    description: " Taskman email configuration: hostname"
    default: "gayal.eea.europa.eu"
    type: "string"
    group: "Redmine configuration"
  - variable: "redmine.environment.T_EMAIL_PORT"
    label: "Taskman email port"
    default: "993"
    description: " Taskman email configuration: port"
    type: "int"
    group: "Redmine configuration"
  - variable: "redmine.environment.T_EMAIL_USER"
    label: "Taskman email user"
    description: " Taskman email configuration: user"
    type: "string"
    group: "Redmine configuration"
  - variable: "redmine.environment.T_EMAIL_PASS"
    label: "Taskman email user password"
    description: " Taskman email configuration: user password"
    type: "string"
    group: "Redmine configuration"
  - variable: "redmineJobs.environment.TASKMAN_DEFAULT_MAILBOX_ENABLED"
    label: "Enable IMAP mailbox polling job"
    description: "Set to 1 only if incoming mailbox polling is required. Keep 0 when using postfix only for outbound email."
    default: "0"
    type: "enum"
    options:
      - "0"
      - "1"
    group: "Redmine configuration"
  - variable: "redmine.environment.SYNC_API_KEY"
    label: "GitHub synchronisation API KEY"
    description: "Can be found under /settings?tab=repositories"
    type: "string"
    required: true
    group: "Redmine configuration"
  - variable: "redmine.environment.SECRET_KEY_BASE"
    label: "Redmine SECRET_KEY_BASE"
    type: "string"
    required: true    
    group: "Redmine configuration"
  - variable: "redmine.environment.GITHUB_AUTHENTICATION"
    label: "GitHub user:token"
    description: "Added from github, used in GitHub repo sync to connect to API"
    type: "string"
    group: "Redmine configuration"
  - variable: "redmine.environment.PLUGINS_URL"
    label: "Plugins location SVN URL"
    default: "https://eeasvn.eea.europa.eu/repositories/deployment/production/taskman"
    description: "The SVN URL that point to the folder where the PRO plugins are located"
    type: "string"
    required: true
    group: "Redmine configuration"
  - variable: "redmine.environment.PLUGINS_USER"
    label: "Plugins SVN User"
    description: "The SVN user"
    type: "string"
    required: true
    group: "Redmine configuration"
  - variable: "redmine.environment.PLUGINS_PASSWORD"
    label: "Plugins SVN User password"
    description: "The SVN user password"
    type: "string"
    required: true
    group: "Redmine configuration"
  - variable: "redmine.environment.ENTRA_ID_TENANT_ID"
    label: "Entra ID: tenant ID"
    description: "Microsoft EEA Entra ID - tenant ID"
    type: "string"
    default: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    group: "Redmine configuration"
  - variable: "redmine.environment.ENTRA_ID_CLIENT_ID"
    label: "Entra ID: client ID"
    description: "Microsoft EEA Entra ID - cliend ID"
    type: "string"
    default: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    group: "Redmine configuration"
  - variable: "redmine.environment.ENTRA_ID_CLIENT_SECRET"
    label: "Entra ID: client secret"
    type: "string"
    required: true
    group: "Redmine configuration"

  - variable: "mysql.environment.MYSQL_DATABASE"
    label: "Redmine database name"
    description: "Mysql database name"
    type: "string"
    required: true
    group: "Database"
  - variable: "mysql.environment.MYSQL_USER"
    label: "Redmine database username"
    description: "Mysql database username"
    type: "string"
    required: true
    group: "Database"
  - variable: "mysql.environment.MYSQL_PASSWORD"
    label: "Redmine database user password"
    description: "Mysql database user password"
    type: "string"
    required: true
    group: "Database"
  - variable: "mysql.environment.MYSQL_ROOT_PASSWORD"
    label: "Redmine database server root password"
    description: "Mysql server root password"
    type: "string"
    required: true
    group: "Database"
  - variable: "mysql.args"
    label: "MySQL server arguments"
    description: "List of MySQL server configuration arguments (e.g., --innodb-buffer-pool-size=10G). Cannot be empty."
    type: "multiline"
    default: |
      - '--innodb-buffer-pool-size=3200M'
      - '--innodb-buffer-pool-instances=8'
      - '--innodb-lru-scan-depth=256'
      - '--innodb-io-capacity=4000'
      - '--innodb-io-capacity-max=8000'
      - '--innodb-redo-log-capacity=512M'
      - '--innodb-flush-log-at-trx-commit=1'
      - '--innodb-buffer-pool-dump-at-shutdown=ON'
      - '--innodb-buffer-pool-load-at-startup=ON'
      - '--innodb-thread-concurrency=0'
      - '--innodb-read-io-threads=16'
      - '--innodb-write-io-threads=16'
      - '--innodb-purge-threads=4'
      - '--innodb-page-cleaners=8'
      - '--innodb-flush-neighbors=0'
      - '--innodb-adaptive-hash-index=ON'
      - '--innodb-stats-on-metadata=OFF'
      - '--innodb-log-buffer-size=64M'
      - '--table-open-cache=8000'
      - '--table-open-cache-instances=16'
      - '--table-definition-cache=8192'
      - '--open-files-limit=20000'
      - '--net-read-timeout=120'
      - '--net-write-timeout=120'
      - '--max-allowed-packet=64M'
      - '--tmp-table-size=64M'
      - '--max-heap-table-size=64M'
      - '--join-buffer-size=4M'
      - '--sort-buffer-size=2M'
      - '--read-buffer-size=256K'
      - '--read-rnd-buffer-size=512K'
      - '--thread-cache-size=100'
      - '--max-connections=100'
      - '--back-log=200'
      - '--character-set-server=utf8mb4'
      - '--collation-server=utf8mb4_unicode_ci'
      - '--sql-mode=NO_ENGINE_SUBSTITUTION'
      - >-
        --optimizer-switch=index_merge=on,index_merge_union=on,index_merge_sort_union=on,index_merge_intersection=on
      - '--optimizer-switch=mrr=on,mrr_cost_based=off,batched_key_access=on'
      - '--optimizer-switch=derived_merge=on,subquery_to_derived=on'
      - >-
        --optimizer-switch=semijoin=on,loosescan=on,firstmatch=on,materialization=on
      - '--optimizer-switch=condition_fanout_filter=on'
      - '--optimizer-switch=use_index_extensions=on'
      - '--optimizer-switch=prefer_ordering_index=on'
      - '--optimizer-switch=skip_scan=on'
      - '--optimizer-switch=hash_join=on'
      - '--optimizer-switch=engine_condition_pushdown=on'
      - '--optimizer-switch=derived_condition_pushdown=on'
      - '--optimizer-switch=use_invisible_indexes=off'
      - '--performance-schema=ON'
      - '--performance-schema-instrument=stage/%=ON'
      - '--performance-schema-consumer-events-stages-current=ON'
    required: true
    group: "Database"
  
  - variable: "mysqlbackup.environment.DB_DUMP_BEGIN"
    label: "Time to start database backup"
    default: "1720"
    description: "UTC time, formatted as a 4 digit number"
    type: "int"
    required: true
    group: "Database"
  - variable: "mysqlbackup.environment.DB_DUMP_FREQUENCY"
    label: "Frequency of backup"
    default: "1440"
    description: "Minutes between backups, set 1440 for daily"
    type: "int"
    required: true
    group: "Database"
  - variable: "mysqlbackup.environment.DB_DUMP_FILENAME_PATTERN"
    label: "Database backup filename"
    default: "taskman_db_dump"
    description: "The name of the database dump file"
    type: "string"
    required: true
    group: "Database"


  - variable: "postfix.serviceName"
    label: "Postfix service name"
    description: "Default is application full name ( application-postfix ) "
    default: ""
    type: "string"
    group: "Mail"
  - variable: "postfix.dryrun"
    label: "Run in development mode"
    description: "If checked, will not send emails, but use mailtrap to catch them"
    default: false
    type: "boolean"
    required: true
    show_subquestion_if: false
    group: "Mail"
    subquestions:
      - variable: "postfix.mtpRelay"
        label: "Postfix relay"
        required: true
        description: "Postfix SMTP relay"
        type: "string"
        default: "ironports.eea.europa.eu"
      - variable: "postfix.mtpPort"
        label: "Postfix relay port"
        description: "Postfix SMTP relay port"
        type: "int"
        required: true
        default: 8587
      - variable: "postfix.mtpUser"
        label: "Postfix user"
        description: "Without authentication, emails will not be sent"
        type: "string"
        required: true
      - variable: "postfix.mtpPass"
        label: "Postfix password"
        description: "Without authentication, emails will not be sent"
        type: "string"
        required: true
      - variable: "postfix.serverName"
        label: "Application url"
        type: "string"
        required: true
 
 
  - variable: "postfix.mailtrap.httpenabled"
    label: "Create mailtrap service for port 80"
    description: "Keep unchecked if you don't want to view the emails in a webinterface"
    type: "boolean"
    default: false
    required: true
    show_if: "postfix.dryrun"
    show_subquestion_if: true
    group: "Mail"
    subquestions:
      - variable: "postfix.mailtrap.serviceType"
        label: "Mailtrap service type"
        description: "Select NodePort to expose mailtrap on port"
        type: "enum"
        options:
          - "NodePort"
          - "ClusterIP"
        default: "ClusterIP"
        required: true
      - variable: "postfix.mailtrap.ingress.enabled"
        label: "Add mailtrap url in ingress"
        default: false
        type: "boolean"
        required: true

  - variable: "postfix.mailtrap.ingress.hostname"
    label: "Mailtrap URL"
    show_if: "postfix.mailtrap.ingress.enabled"
    required: true
    type: "string"
    default: "mailtrap.01dev.eea.europa.eu"
    group: "Mail"
  - variable: "postfix.mailtrap.ingress.certificate"
    label: "Mailtrap certificate name"
    show_if: "postfix.mailtrap.ingress.enabled"
    description: "If empty, https will not be enabled"
    default: "mailtrap.01dev.eea.europa.eu-tls"
    group: "Mail"
