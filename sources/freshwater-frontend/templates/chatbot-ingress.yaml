apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: freshwater-chatbot
  labels:
    {{- include "appl.labels" . | nindent 4 }}
    component: freshwater-frontend-chatbot

  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}

spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.volto.hostname }}
      http:
        paths:
          - backend:
              service:
                name: frontend-volto
                port:
                  number: 3000
            path: /_da/
            pathType: Prefix
          - backend:
              service:
                name: frontend-volto
                port:
                  number: 3000
            path: /_rq/
            pathType: Prefix
          - backend:
              service:
                name: frontend-volto
                port:
                  number: 3000
            path: /_ha/
            pathType: Prefix
  tls:
  - hosts:
    - {{ .Values.volto.hostname }}
    {{- if .Values.ingress.certificate }}
    secretName: {{ .Values.ingress.certificate }}
    {{- end  }}
  {{- end  }}
